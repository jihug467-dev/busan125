<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS MASTER - FINAL</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; color: #333; }
        .hidden { display: none !important; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #888; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--p); font-weight: bold; }
        .post-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .mgr-only { display: none; } /* 감독 전용 UI */
    </style>
</head>
<body>

<!-- [인증 페이지] -->
<div id="auth-page" class="card" style="margin-top:50px;">
    <h2 style="text-align:center; color:var(--p);">⚾️ GS MASTER</h2>
    <div id="login-box">
        <input type="email" id="id-email" placeholder="이메일">
        <input type="password" id="id-pw" placeholder="비밀번호">
        <button class="btn" style="background:var(--p);" id="btnLogin">로그인</button>
        <p onclick="toggleAuth()" style="text-align:center; font-size:13px; margin-top:15px; color:#666; cursor:pointer;">계정 만들기</p>
    </div>
    <div id="join-box" class="hidden">
        <input type="text" id="join-name" placeholder="이름">
        <input type="email" id="join-email" placeholder="이메일">
        <input type="password" id="join-pw" placeholder="비밀번호">
        <input type="text" id="join-team" placeholder="팀 이름">
        <select id="join-role"><option value="player">선수</option><option value="manager">감독</option></select>
        <button class="btn" style="background:var(--a);" id="btnJoin">회원가입 완료</button>
        <p onclick="toggleAuth()" style="text-align:center; font-size:13px; margin-top:15px; color:#666; cursor:pointer;">돌아가기</p>
    </div>
</div>

<!-- [메인 앱] -->
<div id="main-app" class="hidden">
    <header>
        <span id="teamNameDisp" style="font-weight:bold;">팀명</span>
        <span class="material-icons" id="btnLogout" style="cursor:pointer;">logout</span>
    </header>

    <!-- 1. 일정 섹션 -->
    <section id="sec-home" class="app-sec">
        <div class="card">
            <h3>📅 경기/훈련 일정</h3>
            <div id="schedule-list"></div>
            <div class="mgr-only">
                <input type="text" id="sch-text" placeholder="일정 내용 (예: 5/10 14:00 정기전)">
                <button class="btn" style="background:var(--p); font-size:12px;" id="btnAddSch">일정 등록</button>
            </div>
        </div>
    </section>

    <!-- 2. 게시판 섹션 -->
    <section id="sec-board" class="app-sec hidden">
        <div class="card">
            <h3>📋 팀 게시판</h3>
            <div id="board-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="board-msg" placeholder="공지사항이나 메시지를 남기세요" rows="2"></textarea>
            <button class="btn" style="background:var(--p);" id="btnPost">글쓰기</button>
        </div>
    </section>

    <!-- 3. 선수단 섹션 -->
    <section id="sec-players" class="app-sec hidden">
        <div class="card">
            <h3>👥 선수단 명단</h3>
            <div id="player-list"></div>
        </div>
    </section>

    <!-- 4. 라인업 섹션 -->
    <section id="sec-lineup" class="app-sec hidden">
        <div class="card">
            <h3>📝 오늘의 라인업</h3>
            <div id="lineup-display" style="background:#f9f9f9; padding:15px; border-radius:10px; min-height:100px;"></div>
            <div class="mgr-only" style="margin-top:15px;">
                <input type="text" id="l-pos" placeholder="타순/포지션 (예: 1번 지명타자)">
                <input type="text" id="l-name" placeholder="선수 이름">
                <button class="btn" style="background:var(--a);" id="btnAddLineup">라인업 추가</button>
                <button class="btn" style="background:#666; font-size:11px;" id="btnClearLineup">라인업 초기화</button>
            </div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showSec('home')"><span class="material-icons">calendar_today</span><br>일정</div>
        <div class="nav-item" onclick="showSec('board')"><span class="material-icons">forum</span><br>게시판</div>
        <div class="nav-item" onclick="showSec('lineup')"><span class="material-icons">reorder</span><br>라인업</div>
        <div class="nav-item" onclick="showSec('players')"><span class="material-icons">groups</span><br>선수단</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", 
        authDomain: "busan260501-147bb.firebaseapp.com", 
        projectId: "busan260501-147bb", 
        appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let uData = null;

    window.toggleAuth = () => { document.getElementById('login-box').classList.toggle('hidden'); document.getElementById('join-box').classList.toggle('hidden'); };

    // 회원가입
    document.getElementById('btnJoin').onclick = async () => {
        const n=document.getElementById('join-name').value, e=document.getElementById('join-email').value, p=document.getElementById('join-pw').value, t=document.getElementById('join-team').value, r=document.getElementById('join-role').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { name:n, email:e, team:t, role:r, approved:(r==='manager') });
            alert("완료! 로그인 해주세요."); location.reload();
        } catch(err) { alert(err.message); }
    };

    // 로그인
    document.getElementById('btnLogin').onclick = async () => {
        const e=document.getElementById('id-email').value, p=document.getElementById('id-pw').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("아이디/비번 확인!"); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const s = await getDoc(doc(db, "users", user.uid));
            if(s.exists()) {
                uData = s.data();
                if(!uData.approved) { alert("감독 승인 대기중"); signOut(auth); return; }
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('teamNameDisp').innerText = uData.team;
                if(uData.role === 'manager') document.querySelectorAll('.mgr-only').forEach(el => el.style.display = 'block');
                initData();
            }
        }
    });

    function initData() {
        // 1. 일정 로드
        onSnapshot(query(collection(db, "sch"), where("team", "==", uData.team)), (snaps) => {
            const list = document.getElementById('schedule-list'); list.innerHTML = "";
            snaps.forEach(d => { list.innerHTML += `<div class="post-item">📍 ${d.data().text}</div>`; });
        });

        // 2. 게시판 로드
        onSnapshot(query(collection(db, "board"), where("team", "==", uData.team), orderBy("time", "desc")), (snaps) => {
            const list = document.getElementById('board-list'); list.innerHTML = "";
            snaps.forEach(d => {
                const b = d.data();
                list.innerHTML += `<div class="post-item"><strong>${b.name}:</strong> ${b.msg} <br><small style="color:#999;">${new Date(b.time).toLocaleString()}</small></div>`;
            });
        });

        // 3. 선수단 로드
        onSnapshot(query(collection(db, "users"), where("team", "==", uData.team)), (snaps) => {
            const list = document.getElementById('player-list'); list.innerHTML = "";
            snaps.forEach(d => { list.innerHTML += `<div class="post-item">👤 ${d.data().name} (${d.data().role})</div>`; });
        });

        // 4. 라인업 로드
        onSnapshot(query(collection(db, "lineup"), where("team", "==", uData.team), orderBy("time", "asc")), (snaps) => {
            const list = document.getElementById('lineup-display'); list.innerHTML = "";
            snaps.forEach(d => { list.innerHTML += `<div style="margin-bottom:5px;"><b>${d.data().pos}</b> : ${d.data().name}</div>`; });
        });
    }

    // 기능 함수들
    document.getElementById('btnAddSch').onclick = async () => {
        await addDoc(collection(db, "sch"), { team:uData.team, text:document.getElementById('sch-text').value });
        document.getElementById('sch-text').value = "";
    };

    document.getElementById('btnPost').onclick = async () => {
        await addDoc(collection(db, "board"), { team:uData.team, name:uData.name, msg:document.getElementById('board-msg').value, time:Date.now() });
        document.getElementById('board-msg').value = "";
    };

    document.getElementById('btnAddLineup').onclick = async () => {
        await addDoc(collection(db, "lineup"), { team:uData.team, pos:document.getElementById('l-pos').value, name:document.getElementById('l-name').value, time:Date.now() });
        document.getElementById('l-pos').value = ""; document.getElementById('l-name').value = "";
    };

    document.getElementById('btnClearLineup').onclick = async () => {
        if(confirm("라인업을 초기화할까요?")) {
            const q = query(collection(db, "lineup"), where("team", "==", uData.team));
            const snaps = await getDocs(q);
            snaps.forEach(async (d) => { await deleteDoc(doc(db, "lineup", d.id)); });
        }
    };

    window.showSec = (id) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
