<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GS MASTER FINAL</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f0f2f5; --card: #ffffff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        
        header { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #main-app { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 라인업 필드 */
        .field { position: relative; width: 100%; aspect-ratio: 1; background: #388e3c; border: 3px solid white; border-radius: 10px; margin-top: 10px; }
        .p-node { position: absolute; width: 40px; height: 40px; background: white; border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; transform: translate(-50%, -50%); }

        /* 채팅 */
        .chat-win { height: 250px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; }
        .m-msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .m-me { background: var(--p); color: white; align-self: flex-end; }
        .m-you { background: #eee; color: #333; align-self: flex-start; }

        /* 하단바 */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #888; cursor: pointer; }
        .nav-btn.active { color: var(--p); }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-page" style="padding: 30px;">
    <h1 style="text-align:center; color:var(--p);">GS MASTER</h1>
    <div id="login-form" class="card">
        <input type="email" id="email" placeholder="이메일">
        <input type="password" id="pw" placeholder="비밀번호">
        <button class="btn" onclick="login()">로그인</button>
        <p style="text-align:center; font-size:13px; color:#888;" onclick="tglAuth()">계정이 없으신가요? 회원가입</p>
    </div>
    <div id="join-form" class="card hidden">
        <input type="text" id="j-name" placeholder="이름">
        <input type="text" id="j-team" placeholder="팀명 (정확히 입력)">
        <input type="email" id="j-email" placeholder="이메일">
        <input type="password" id="j-pw" placeholder="비밀번호">
        <select id="j-role"><option value="player">선수</option><option value="manager">감독</option></select>
        <button class="btn" style="background:var(--a)" onclick="join()">가입하기</button>
        <p style="text-align:center; font-size:13px; color:#888;" onclick="tglAuth()">로그인으로 돌아가기</p>
    </div>
</div>

<div id="main-app" class="hidden">
    <header><span id="head-team">TEAM</span> <span class="material-icons" onclick="logout()">logout</span></header>
    
    <div id="s-home" class="sec">
        <div class="card" id="mgr-req" style="display:none; background:#fff0f0;">
            <b>승인 대기중인 팀원</b><div id="req-list"></div>
        </div>
        <div class="card">
            <h3>📢 팀 공지사항</h3>
            <div id="notice-list" style="font-size:14px; line-height:1.6;"></div>
            <div class="mgr-only hidden"><textarea id="n-input"></textarea><button class="btn" onclick="addNotice()">공지등록</button></div>
        </div>
    </div>

    <div id="s-stat" class="sec hidden">
        <div class="card">
            <h3>타자 순위 (AVG / OPS)</h3>
            <div id="team-h-list"></div>
        </div>
        <div class="card">
            <h3>투수 순위 (ERA)</h3>
            <div id="team-p-list"></div>
        </div>
    </div>

    <div id="s-lineup" class="sec hidden">
        <div class="card">
            <h3>오늘의 라인업</h3>
            <div class="field" id="ball-field">
                <div class="p-node" style="left:50%; top:65%;" id="p-P">P</div>
                <div class="p-node" style="left:50%; top:90%;" id="p-C">C</div>
                <div class="p-node" style="left:85%; top:60%;" id="p-1B">1B</div>
                <div class="p-node" style="left:70%; top:35%;" id="p-2B">2B</div>
                <div class="p-node" style="left:30%; top:35%;" id="p-SS">SS</div>
                <div class="p-node" style="left:15%; top:60%;" id="p-3B">3B</div>
                <div class="p-node" style="left:15%; top:15%;" id="p-LF">LF</div>
                <div class="p-node" style="left:50%; top:10%;" id="p-CF">CF</div>
                <div class="p-node" style="left:85%; top:15%;" id="p-RF">RF</div>
            </div>
            <div class="mgr-only hidden" style="margin-top:10px;">
                <select id="l-pos"><option value="P">투수</option><option value="C">포수</option><option value="1B">1루수</option><option value="2B">2루수</option><option value="3B">3루수</option><option value="SS">유격수</option><option value="LF">좌익수</option><option value="CF">중견수</option><option value="RF">우익수</option></select>
                <input type="text" id="l-name" placeholder="선수이름">
                <button class="btn" onclick="setLineup()">배치하기</button>
            </div>
        </div>
    </div>

    <div id="s-chat" class="sec hidden">
        <div class="card">
            <h3>팀 채팅방</h3>
            <div id="chat-win" class="chat-win"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="chat-msg" style="margin:0;">
                <button class="btn" style="width:80px;" onclick="sendMsg()">전송</button>
            </div>
        </div>
    </div>

    <div id="s-my" class="sec hidden">
        <div id="my-info-card"></div>
        <div class="card">
            <h3>기록 수정 (누적 수치)</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="number" id="m-ab" placeholder="타수">
                <input type="number" id="m-hit" placeholder="안타">
                <input type="number" id="m-bb" placeholder="볼넷">
                <input type="number" id="m-hr" placeholder="홈런">
                <input type="number" id="m-ip" placeholder="이닝">
                <input type="number" id="m-er" placeholder="자책">
            </div>
            <button class="btn" style="margin-top:10px;" onclick="saveStat()">기록 저장</button>
        </div>
        <div class="card">
            <h3>팀원 리스트</h3>
            <div id="total-player-list"></div>
        </div>
    </div>

    <nav>
        <div class="nav-btn active" onclick="showS('home')"><span class="material-icons">home</span>홈</div>
        <div class="nav-btn" onclick="showS('stat')"><span class="material-icons">analytics</span>팀기록</div>
        <div class="nav-btn" onclick="showS('lineup')"><span class="material-icons">reorder</span>라인업</div>
        <div class="nav-btn" onclick="showS('chat')"><span class="material-icons">chat</span>채팅</div>
        <div class="nav-btn" onclick="showS('my')"><span class="material-icons">person</span>내정보</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", authDomain: "busan260501-147bb.firebaseapp.com", projectId: "busan260501-147bb", appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" };
    const app = initializeApp(cfg); const db = getFirestore(app); const auth = getAuth(app);
    let uData = null, uid = null;

    window.tglAuth = () => { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('join-form').classList.toggle('hidden'); };
    window.showS = (id) => { 
        document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden')); 
        document.getElementById('s-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            uid = user.uid; const s = await getDoc(doc(db, "users", uid));
            if(s.exists()) {
                uData = s.data(); if(!uData.approved) { alert("승인 대기중"); signOut(auth); return; }
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('head-team').innerText = uData.team;
                if(uData.role==='manager') { document.querySelectorAll('.mgr-only').forEach(e=>e.classList.remove('hidden')); loadReqs(); }
                initRealtime();
            }
        } else { document.getElementById('auth-page').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
    });

    function initRealtime() {
        // 1. 공지사항
        onSnapshot(query(collection(db, "notice"), where("team","==",uData.team), orderBy("t","desc")), s => {
            const l = document.getElementById('notice-list'); l.innerHTML = "";
            s.forEach(d => l.innerHTML += `<div style="border-bottom:1px solid #eee; padding:5px 0;"><b>[공지]</b> ${d.data().m}</div>`);
        });
        // 2. 팀원 & 기록 연동 (핵심!)
        onSnapshot(query(collection(db, "users"), where("team","==",uData.team), where("approved","==",true)), s => {
            const hL = document.getElementById('team-h-list'), pL = document.getElementById('team-p-list'), tL = document.getElementById('total-player-list');
            let ps = []; s.forEach(d => ps.push(d.data()));
            
            hL.innerHTML = ""; ps.sort((a,b) => (b.hit/(b.ab||1)) - (a.hit/(a.ab||1))).forEach(p => {
                const avg = (p.hit/(p.ab||1)).toFixed(3);
                hL.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2f2f2;"><span>${p.name}</span><b>${avg}</b></div>`;
            });

            pL.innerHTML = ""; ps.filter(p=>p.ip>0).sort((a,b)=>(a.er/a.ip)-(b.er/b.ip)).forEach(p => {
                const era = ((p.er*7)/(p.ip||1)).toFixed(2);
                pL.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2f2f2;"><span>${p.name}</span><b>ERA ${era}</b></div>`;
            });

            tL.innerHTML = ""; ps.forEach(p => tL.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">${p.name} (${p.role})</div>`);
            
            const my = ps.find(p=>p.uid===uid); if(my) { uData = my; renderMy(); }
        });
        // 3. 라인업
        onSnapshot(query(collection(db, "lineup"), where("team","==",uData.team)), s => {
            s.forEach(d => { const lo = d.data(); if(document.getElementById('p-'+lo.pos)) document.getElementById('p-'+lo.pos).innerHTML = `<span style="font-size:8px; color:var(--a);">${lo.pos}</span><br>${lo.name}`; });
        });
        // 4. 채팅
        onSnapshot(query(collection(db, "chats"), where("team","==",uData.team), orderBy("t","asc")), s => {
            const w = document.getElementById('chat-win'); w.innerHTML = "";
            s.forEach(d => { const c = d.data(); w.innerHTML += `<div class="m-msg ${c.uid===uid?'m-me':'m-you'}"><small>${c.n}</small><br>${c.m}</div>`; });
            w.scrollTop = w.scrollHeight;
        });
    }

    function renderMy() {
        const avg = (uData.hit/(uData.ab||1)).toFixed(3);
        const obp = ((Number(uData.hit)+Number(uData.bb))/(Number(uData.ab)+Number(uData.bb)||1)).toFixed(3);
        document.getElementById('my-info-card').innerHTML = `
            <div class="card" style="background:var(--p); color:white;">
                <h2 style="margin:0;">${uData.name} <small style="font-size:12px;">(${uData.role})</small></h2>
                <div style="display:grid; grid-template-columns
