<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GS MASTER - Final Patch</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #0747a6; --p-dark: #002d72; --a: #d31145; --bg: #f4f7fa; --card: #ffffff; --text: #1d1d1f; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        header { flex-shrink: 0; background: var(--card); border-bottom: 1px solid #e1e4e8; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; padding-top: calc(18px + env(safe-area-inset-top)); }
        header b { font-size: 20px; color: var(--p); font-weight: 800; }

        .app-sec { flex: 1; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border-radius: 20px; margin: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { font-size: 16px; margin: 0 0 15px 0; color: var(--p); }

        input, select { background: #f1f3f5; border: none; border-radius: 12px; padding: 12px; margin-bottom: 10px; width: 100%; font-size: 15px; outline: none; }
        .btn { width: 100%; height: 50px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        .btn-gray { background: #e9ecef; color: #495057; }
        
        /* 투수/타자 탭 활성화 시 색상 변경 (dks 로직 해결) */
        .tab-btn.active { background: var(--p) !important; color: white !important; }

        .nav { position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 10px; right: 10px; height: 65px; background: white; border-radius: 20px; display: flex; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; }
        .nav-item.active { color: var(--p); }
        
        .list-item { padding: 15px; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; align-items: center; }
        /* 방출 버튼 스타일 */
        .kick-btn { color: var(--a); font-weight: bold; font-size: 12px; padding: 5px 10px; border: 1px solid var(--a); border-radius: 8px; cursor: pointer; }
        
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:5000; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="auth-page" class="app-sec" style="display:flex; align-items:center;">
    <div class="card" style="width:90%; max-width:400px; margin:auto;">
        <h2 style="text-align:center; color:var(--p);">GS MASTER</h2>
        
        <div id="login-box">
            <input type="email" id="id-email" placeholder="이메일">
            <input type="password" id="id-pw" placeholder="비밀번호">
            <button class="btn btn-p" id="btnLogin">로그인</button>
            <p style="text-align:center; font-size:13px; margin-top:20px; color:#666;" onclick="toggleAuth(false)">아직 회원이 아니신가요? <b>회원가입</b></p>
        </div>

        <div id="join-box" class="hidden">
            <input type="text" id="join-name" placeholder="이름">
            <input type="email" id="join-email" placeholder="이메일">
            <input type="password" id="join-pw" placeholder="비밀번호">
            <select id="join-team">
                <option value="GS 바스켓">GS 바스켓</option>
                <option value="부산 자이언츠">부산 자이언츠</option>
            </select>
            <select id="join-role">
                <option value="player">선수</option>
                <option value="manager">감독(관리자)</option>
            </select>
            <button class="btn btn-p" id="btnJoin">회원가입 완료</button>
            <p style="text-align:center; font-size:13px; margin-top:20px; color:#666;" onclick="toggleAuth(true)">이미 계정이 있나요? <b>로그인</b></p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <header><b id="teamNameDisp">팀 정보</b><span class="material-icons" id="btnLogout" style="cursor:pointer;">logout</span></header>

    <section id="sec-home" class="app-sec">
        <div class="card"><h3>게시판</h3><div id="board-list"></div></div>
    </section>

    <section id="sec-stats" class="app-sec hidden">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-gray tab-btn active" id="tab-h-btn" style="flex:1;">타자</button>
                <button class="btn btn-gray tab-btn" id="tab-p-btn" style="flex:1;">투수</button>
            </div>
            <div id="h-area"><div id="h-list"></div></div>
            <div id="p-area" class="hidden"><div id="p-list"></div></div>
            <button class="btn btn-gray" id="btnOpenStat" style="margin-top:15px; border:1px solid #ddd;">기록 수정</button>
        </div>
    </section>

    <section id="sec-players" class="app-sec hidden">
        <div class="card">
            <h3>우리 팀원</h3>
            <div id="player-list"></div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="goTab('home', this)"><span class="material-icons">home</span></div>
        <div class="nav-item" onclick="goTab('stats', this)"><span class="material-icons">analytics</span></div>
        <div class="nav-item" onclick="goTab('players', this)"><span class="material-icons">people</span></div>
    </nav>
</div>

<div id="stat-modal" class="modal hidden">
    <div class="card" style="width:85%;">
        <h3>최신 기록 업데이트</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>타수<input type="number" id="m-ab"></div><div>안타<input type="number" id="m-hit"></div>
            <div>이닝<input type="number" step="0.1" id="m-ip"></div><div>자책<input type="number" id="m-er"></div>
        </div>
        <button class="btn btn-p" id="btnSaveStat">저장</button>
        <button class="btn" style="background:none;" onclick="document.getElementById('stat-modal').classList.add('hidden')">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, orderBy, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", authDomain: "busan260501-147bb.firebaseapp.com", projectId: "busan260501-147bb", appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" };
    const app = initializeApp(cfg); const db = getFirestore(app); const auth = getAuth(app);
    let uData = null, uid = null;

    onAuthStateChanged(auth, user => {
        if(user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), s => {
                uData = s.data();
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('teamNameDisp').innerText = uData.team;
                initApp();
            });
        }
    });

    window.toggleAuth = (isLogin) => {
        document.getElementById('login-box').classList.toggle('hidden', !isLogin);
        document.getElementById('join-box').classList.toggle('hidden', isLogin);
    };

    window.goTab = (id, el) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    // 회원가입 로직
    document.getElementById('btnJoin').onclick = async () => {
        const e = document.getElementById('join-email').value, p = document.getElementById('join-pw').value;
        const n = document.getElementById('join-name').value, t = document.getElementById('join-team').value, r = document.getElementById('join-role').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, name: n, team: t, role: r, ab:0, hit:0, p_ip:0, p_er:0, approved:true });
            alert("회원가입 완료!");
        } catch(err) { alert("가입 실패: " + err.message); }
    };

    function initApp() {
        // 팀원 & 기록 로드 (투수기록 로직 수정)
        onSnapshot(query(collection(db, "users"), where("team", "==", uData.team)), s => {
            const pl = document.getElementById('player-list'), hl = document.getElementById('h-list'), tl = document.getElementById('p-list');
            pl.innerHTML = ""; hl.innerHTML = ""; tl.innerHTML = "";
            let players = [];
            s.forEach(d => {
                const p = d.data(); players.push(p);
                // 팀원 목록 (감독 전용 방출 버튼)
                pl.innerHTML += `<div class="list-item">
                    <span>${p.name} (${p.role==='manager'?'감독':'선수'})</span>
                    ${uData.role==='manager' && p.uid !== uid ? `<span class="kick-btn" onclick="window.kick('${p.uid}')">방출</span>` : ''}
                </div>`;
            });
            // 타자 렌더링
            players.sort((a,b) => (b.hit/(a.ab||1)) - (a.hit/(a.ab||1))).forEach(p => {
                const avg = p.ab > 0 ? (p.hit/p.ab).toFixed(3) : ".000";
                hl.innerHTML += `<div class="list-item"><span>${p.name}</span><b>${avg}</b></div>`;
            });
            // 투수 렌더링 (이닝이 0보다 큰 경우만 표시)
            players.filter(p => p.p_ip > 0).sort((a,b) => ((a.p_er*9)/a.p_ip) - ((b.p_er*9)/b.p_ip)).forEach(p => {
                const era = ((p.p_er*9)/p.p_ip).toFixed(2);
                tl.innerHTML += `<div class="list-item"><span>${p.name} (${p.p_ip}이닝)</span><b>${era}</b></div>`;
            });
        });
    }

    // 방출 기능 (감독 전용)
    window.kick = async (targetId) => {
        if(confirm("정말로 이 팀원을 방출하시겠습니까?")) {
            await updateDoc(doc(db, "users", targetId), { team: "무소속" });
            alert("방출되었습니다.");
        }
    };

    // 기록 저장
    document.getElementById('btnSaveStat').onclick = async () => {
        const up = { ab: Number(document.getElementById('m-ab').value), hit: Number(document.getElementById('m-hit').value), p_ip: Number(document.getElementById('m-ip').value), p_er: Number(document.getElementById('m-er').value) };
        await updateDoc(doc(db, "users", uid), up);
        document.getElementById('stat-modal').classList.add('hidden');
    };

    // 탭 버튼 색상 변경 이벤트
    document.getElementById('tab-h-btn').onclick = () => {
        document.getElementById('h-area').classList.remove('hidden'); document.getElementById('p-area').classList.add('hidden');
        document.getElementById('tab-h-btn').classList.add('active'); document.getElementById('tab-p-btn').classList.remove('active');
    };
    document.getElementById('tab-p-btn').onclick = () => {
        document.getElementById('p-area').classList.remove('hidden'); document.getElementById('h-area').classList.add('hidden');
        document.getElementById('tab-p-btn').classList.add('active'); document.getElementById('tab-h-btn').classList.remove('active');
    };

    document.getElementById('btnOpenStat').onclick = () => {
        document.getElementById('m-ab').value = uData.ab; document.getElementById('m-hit').value = uData.hit;
        document.getElementById('m-ip').value = uData.p_ip; document.getElementById('m-er').value = uData.p_er;
        document.getElementById('stat-modal').classList.remove('hidden');
    };
    document.getElementById('btnLogin').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('id-email').value, document.getElementById('id-pw').value);
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
