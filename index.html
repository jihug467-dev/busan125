<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Slam Master - Pro v4</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        /* 메뉴 & UI */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 150; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #999; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--p); }

        /* 게시판 & 기록 */
        .post { border-bottom: 1px solid #eee; padding: 10px 0; position: relative; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-p { background: var(--p); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .logo-preview { width: 60px; height: 60px; border-radius: 50%; background: #eee; object-fit: cover; border: 2px solid var(--p); }
    </style>
</head>
<body>

<!-- 사이드 메뉴 -->
<div id="sideMenu" class="side-menu">
    <div style="padding:20px; background:var(--p); color:white;"><b>MENU</b></div>
    <div class="menu-item" onclick="showSec('players')"><span class="material-icons">groups</span> 선수 명단</div>
    <div class="menu-item mgr-ui hidden" onclick="showSec('approval')"><span class="material-icons">how_to_reg</span> 가입 승인 관리</div>
    <div class="menu-item" onclick="showSec('stats')"><span class="material-icons">assessment</span> 개인 기록실</div>
    <div class="menu-item" onclick="showSec('profile')"><span class="material-icons">settings</span> 팀 설정 / 프로필</div>
    <div class="menu-item" style="color:red" onclick="handleLogout()"><span class="material-icons">logout</span> 로그아웃</div>
</div>

<header id="appHeader" class="hidden">
    <span class="material-icons" onclick="toggleMenu()">menu</span>
    <div style="display:flex; align-items:center; gap:10px;">
        <img id="header-logo" class="logo-preview" style="width:30px; height:30px; border:none;">
        <span id="headerTitle">TEAM</span>
    </div>
    <span class="material-icons" onclick="showSec('board')">dashboard</span>
</header>

<!-- 메인 앱 섹션 -->
<div id="page-main" class="hidden">
    
    <!-- 게시판 섹션 -->
    <section id="sec-board" class="app-sec">
        <div class="card">
            <h3>📝 팀 게시판</h3>
            <textarea id="board-input" placeholder="오늘의 훈련 내용이나 소식을 남기세요!"></textarea>
            <button class="btn-p" onclick="savePost()">글 올리기</button>
            <div id="board-list" style="margin-top:15px;"></div>
        </div>
    </section>

    <!-- 가입 승인 관리 (감독 전용) -->
    <section id="sec-approval" class="app-sec hidden">
        <div class="card">
            <h3 style="color:var(--a)">🚩 가입 신청 목록</h3>
            <div id="approval-list"></div>
        </div>
    </section>

    <!-- 개인 기록실 (투수/타자) -->
    <section id="sec-stats" class="app-sec hidden">
        <div class="card">
            <h3>📊 내 성적표</h3>
            <div class="stat-grid">
                <div style="border-right: 1px solid #eee; padding-right:10px;">
                    <p><b>[타자 성적]</b></p>
                    <small>타율: <span id="st-avg">0.000</span></small><br>
                    <small>홈런: <span id="st-hr">0</span></small>
                </div>
                <div style="padding-left:10px;">
                    <p><b>[투수 성적]</b></p>
                    <small>방어율: <span id="st-era">0.00</span></small><br>
                    <small>승리: <span id="st-w">0</span></small>
                </div>
            </div>
            <div class="mgr-ui hidden">
                <hr>
                <select id="stat-p-select"><option>선수 선택</option></select>
                <input type="number" id="in-avg" step="0.001" placeholder="타율">
                <input type="number" id="in-era" step="0.01" placeholder="방어율">
                <button class="btn-p" onclick="saveStats()">성적 업데이트</button>
            </div>
        </div>
    </section>

    <!-- 팀 설정 (로고/탈퇴) -->
    <section id="sec-profile" class="app-sec hidden">
        <div class="card">
            <h3>⚙️ 팀 및 프로필 설정</h3>
            <div class="mgr-ui hidden">
                <p>팀 로고 URL (이미지 주소)</p>
                <input type="text" id="logo-url-input" placeholder="https://...">
                <button class="btn-p" onclick="saveLogo()">로고 변경</button>
            </div>
            <hr>
            <button class="btn-p" style="background:#666;" onclick="withdraw()">회원 탈퇴</button>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item" onclick="showSec('board')"><span class="material-icons">forum</span>게시판</div>
        <div class="nav-item" onclick="showSec('stats')"><span class="material-icons">analytics</span>기록</div>
        <div class="nav-item active" onclick="toggleMenu()"><span class="material-icons">menu</span>메뉴</div>
    </nav>
</div>

<!-- (로그인 코드는 이전과 동일하므로 생략하거나 기존 것 사용, 아래 스크립트에 핵심 로직 추가) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, updateDoc, deleteDoc, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg",
        authDomain: "busan260501-147bb.firebaseapp.com",
        projectId: "busan260501-147bb",
        storageBucket: "busan260501-147bb.firebasestorage.app",
        messagingSenderId: "322128107410",
        appId: "1:322128107410:web:c6b8fbbda00a09fcae534b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let userData = null;

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const udoc = await getDoc(doc(db, "users", user.uid));
            userData = udoc.data();
            if(!userData.approved) { alert("승인 대기 중!"); signOut(auth); return; }
            
            document.getElementById('page-main').classList.remove('hidden');
            document.getElementById('appHeader').classList.remove('hidden');
            document.getElementById('headerTitle').innerText = userData.teamName;
            
            if(userData.role === 'manager') {
                document.querySelectorAll('.mgr-ui').forEach(el => el.classList.remove('hidden'));
                loadApprovalList();
            }
            loadBoard();
            loadTeamLogo();
            loadMyStats();
        } else {
            // 로그인 페이지 이동 로직 (생략)
        }
    });

    // --- 가입 승인 로직 ---
    function loadApprovalList() {
        const q = query(collection(db, "users"), where("mgrId", "==", auth.currentUser.uid), where("approved", "==", false));
        onSnapshot(q, (qs) => {
            const list = document.getElementById('approval-list');
            list.innerHTML = qs.empty ? "신청자가 없습니다." : "";
            qs.forEach(uDoc => {
                const p = uDoc.data();
                const d = document.createElement('div');
                d.className = "post";
                d.innerHTML = `<span>${p.email}</span> <button onclick="approveUser('${uDoc.id}')">승인</button>`;
                list.appendChild(d);
            });
        });
    }
    window.approveUser = async (uid) => { await updateDoc(doc(db, "users", uid), { approved: true }); alert("승인 완료!"); };

    // --- 로고 관리 ---
    window.saveLogo = async () => {
        const url = document.getElementById('logo-url-input').value;
        await setDoc(doc(db, "teams", userData.teamName), { logo: url }, { merge: true });
        alert("로고 적용 완료!");
    };
    function loadTeamLogo() {
        onSnapshot(doc(db, "teams", userData.teamName), (d) => {
            if(d.exists() && d.data().logo) document.getElementById('header-logo').src = d.data().logo;
        });
    }

    // --- 게시판 ---
    window.savePost = async () => {
        const text = document.getElementById('board-input').value;
        await addDoc(collection(db, "boards"), {
            team: userData.teamName, text, user: userData.email, time: Date.now()
        });
        document.getElementById('board-input').value = "";
    };
    function loadBoard() {
        const q = query(collection(db, "boards"), where("team", "==", userData.teamName), orderBy("time", "desc"));
        onSnapshot(q, (qs) => {
            const list = document.getElementById('board-list');
            list.innerHTML = "";
            qs.forEach(d => {
                const post = d.data();
                list.innerHTML += `<div class="post"><b>${post.user.split('@')[0]}</b>: ${post.text}</div>`;
            });
        });
    }

    // --- 기록 관리 ---
    async function loadMyStats() {
        const d = await getDoc(doc(db, "stats", auth.currentUser.uid));
        if(d.exists()) {
            const s = d.data();
            document.getElementById('st-avg').innerText = s.avg || "0.000";
            document.getElementById('st-era').innerText = s.era || "0.00";
        }
    }
    window.saveStats = async () => { /* 감독이 선택한 선수 UID에 성적 저장 로직 */ alert("준비 중 기능입니다."); };

    // --- 탈퇴 ---
    window.withdraw = async () => {
        if(confirm("정말 탈퇴하시겠습니까? 데이터가 삭제됩니다.")) {
            await deleteDoc(doc(db, "users", auth.currentUser.uid));
            await deleteUser(auth.currentUser);
            location.reload();
        }
    };

    window.toggleMenu = () => document.getElementById('sideMenu').classList.toggle('active');
    window.showSec = (id) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        toggleMenu();
    };
    window.handleLogout = () => { signOut(auth); location.reload(); };
</script>
</body>
</html>
