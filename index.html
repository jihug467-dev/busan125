<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GS MASTER</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; color: #333; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #888; cursor: pointer; font-size: 12px; position: relative; }
        .nav-item.active { color: var(--p); font-weight: bold; }
        .noti-badge { position: absolute; top: 5px; right: 20%; background: var(--a); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; display: none; }
        .user-unread { background: var(--a); width: 8px; height: 8px; border-radius: 50%; display: none; margin-left: 5px; }
        .chat-box { height: 300px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 13px; word-break: break-all; }
        .msg.me { background: var(--p); color: white; margin-left: auto; }
        .msg.you { background: #e9e9eb; color: #333; }
        .req-item { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .field-container { position: relative; width: 100%; aspect-ratio: 1/1; background: #2e7d32; border-radius: 10px; border: 3px solid #fff; }
        .player-node { position: absolute; width: 45px; height: 45px; background: white; border: 2px solid var(--p); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="auth-page" class="card" style="margin-top:50px;">
    <h2 style="text-align:center; color:var(--p);">⚾️ GS MASTER</h2>
    <div id="login-box">
        <input type="email" id="id-email" placeholder="이메일">
        <input type="password" id="id-pw" placeholder="비밀번호">
        <button class="btn" style="background:var(--p);" id="btnLogin">로그인</button>
        <p onclick="toggleAuth()" style="text-align:center; font-size:14px; margin-top:20px; color:#666; cursor:pointer; padding:15px;">계정 만들기</p>
    </div>
    <div id="join-box" class="hidden">
        <input type="text" id="join-name" placeholder="이름">
        <input type="email" id="join-email" placeholder="이메일">
        <input type="password" id="join-pw" placeholder="비밀번호">
        <input type="text" id="join-team" placeholder="팀 이름">
        <select id="join-role"><option value="player">선수</option><option value="manager">감독</option></select>
        <button class="btn" style="background:var(--a);" id="btnJoin">회원가입 완료</button>
        <p onclick="toggleAuth()" style="text-align:center; font-size:14px; margin-top:20px; color:#666; cursor:pointer; padding:15px;">돌아가기</p>
    </div>
</div>

<div id="main-app" class="hidden">
    <header>
        <span id="teamNameDisp" style="font-weight:bold;">팀명</span>
        <span class="material-icons" id="btnLogout" style="cursor:pointer;">logout</span>
    </header>

    <section id="sec-home" class="app-sec">
        <div class="card" id="mgr-req-card" style="display:none; border:2px solid var(--a);">
            <h3 style="color:var(--a); margin-top:0;">🔔 가입 승인 대기</h3>
            <div id="request-list"></div>
        </div>
        <div class="card">
            <h3>📅 경기/훈련 일정</h3>
            <div id="schedule-list"></div>
            <div class="mgr-only" style="display:none; margin-top:15px; padding:10px; background:#f9f9f9; border-radius:10px;">
                <input type="date" id="sch-date">
                <input type="text" id="sch-text" placeholder="내용 입력">
                <button class="btn" style="background:var(--p);" id="btnAddSch">일정 등록</button>
            </div>
        </div>
    </section>

    <section id="sec-board" class="app-sec hidden">
        <div style="display:flex; padding: 10px 10px 0 10px; gap: 10px;">
            <button id="btn-sub-board" class="btn" style="background:var(--p); font-size:12px;" onclick="switchSubTab('board')">팀 게시판</button>
            <button id="btn-sub-chat" class="btn" style="background:#ccc; font-size:12px;" onclick="switchSubTab('chat')">1:1 메시지</button>
        </div>
        <div id="sub-board-view" class="card">
            <div id="board-list" style="max-height: 300px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom:10px;"></div>
            <textarea id="board-msg" placeholder="공지/글 작성" rows="2"></textarea>
            <button class="btn" style="background:var(--p);" id="btnPost">등록</button>
        </div>
        <div id="sub-chat-list-view" class="card hidden">
            <h3>💬 대화 상대 선택</h3>
            <div id="chat-user-list"></div>
        </div>
        <div id="sub-chat-room-view" class="card hidden">
            <div style="display:flex; align-items:center; margin-bottom:10px; gap:10px;">
                <span class="material-icons" onclick="closeChatRoom()" style="cursor:pointer;">arrow_back</span>
                <h3 id="chat-target-name" style="margin:0;">대화</h3>
            </div>
            <div id="chat-list" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="메시지...">
                <button class="btn" style="background:var(--a); width:70px; margin:0;" id="btnChatSend">전송</button>
            </div>
        </div>
    </section>

    <section id="sec-stats" class="app-sec hidden">
        <div class="card">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn" id="btn-tab-h" style="background:var(--p);" onclick="changeStatTab('h')">타자</button>
                <button class="btn" id="btn-tab-p" style="background:#ccc;" onclick="changeStatTab('p')">투수</button>
            </div>
            <table class="stat-table" id="h-table">
                <thead><tr><th>No.</th><th>이름</th><th>타율</th><th>안타</th><th>홈런</th></tr></thead>
                <tbody id="h-list"></tbody>
            </table>
            <table class="stat-table hidden" id="p-table">
                <thead><tr><th>No.</th><th>이름</th><th>ERA</th><th>승</th><th>이닝</th></tr></thead>
                <tbody id="p-list"></tbody>
            </table>
            <button class="btn" style="background:var(--a); margin-top:15px;" onclick="openMyStat()">내 기록 수정</button>
        </div>
    </section>

    <section id="sec-lineup" class="app-sec hidden">
        <div class="card">
            <div class="field-container">
                <div class="player-node" style="left:50%; top:60%;" id="pos-P"><span>투수</span><p id="txt-P">-</p></div>
                <div class="player-node" style="left:50%; top:85%;" id="pos-C"><span>포수</span><p id="txt-C">-</p></div>
                <div class="player-node" style="left:78%; top:55%;" id="pos-1B"><span>1루</span><p id="txt-1B">-</p></div>
                <div class="player-node" style="left:65%; top:35%;" id="pos-2B"><span>2루</span><p id="txt-2B">-</p></div>
                <div class="player-node" style="left:35%; top:35%;" id="pos-SS"><span>유격</span><p id="txt-SS">-</p></div>
                <div class="player-node" style="left:22%; top:55%;" id="pos-3B"><span>3루</span><p id="txt-3B">-</p></div>
                <div class="player-node" style="left:15%; top:20%;" id="pos-LF"><span>좌익</span><p id="txt-LF">-</p></div>
                <div class="player-node" style="left:50%; top:15%;" id="pos-CF"><span>중견</span><p id="txt-CF">-</p></div>
                <div class="player-node" style="left:85%; top:20%;" id="pos-RF"><span>우익</span><p id="txt-RF">-</p></div>
            </div>
            <div class="mgr-only" style="display:none; margin-top:15px;">
                <select id="l-pos-select"><option value="P">투수</option><option value="C">포수</option><option value="1B">1루</option><option value="2B">2루</option><option value="3B">3루</option><option value="SS">유격</option><option value="LF">좌익</option><option value="CF">중견</option><option value="RF">우익</option></select>
                <input type="text" id="l-name" placeholder="선수 이름">
                <button class="btn" style="background:var(--p);" id="btnAddLineup">배치</button>
            </div>
        </div>
    </section>

    <section id="sec-players" class="app-sec hidden">
        <div class="card">
            <h3>👤 내 정보 수정</h3>
            <input type="text" id="my-name" placeholder="이름">
            <input type="number" id="my-backnum" placeholder="등번호">
            <button class="btn" style="background:var(--p);" id="btnUpdateProfile">저장</button>
        </div>
        <div class="card">
            <h3>👥 팀원 명단</h3>
            <div id="player-list"></div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showSec('home')"><span class="material-icons">home</span><br>홈</div>
        <div class="nav-item" onclick="showSec('board')"><span class="material-icons">chat</span><br>톡/게시판<div id="badge-main-chat" class="noti-badge">N</div></div>
        <div class="nav-item" onclick="showSec('stats')"><span class="material-icons">leaderboard</span><br>기록</div>
        <div class="nav-item" onclick="showSec('lineup')"><span class="material-icons">groups</span><br>라인업</div>
        <div class="nav-item" onclick="showSec('players')"><span class="material-icons">person</span><br>선수단</div>
    </nav>
</div>

<div id="stat-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:flex; justify-content:center; align-items:center;">
    <div class="card" style="width:90%;">
        <h3>기록 수정</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <div>타수<input type="number" id="m-ab"></div>
            <div>안타<input type="number" id="m-hit"></div>
            <div>홈런<input type="number" id="m-hr"></div>
            <div>자책<input type="number" id="m-p-er"></div>
            <div>이닝<input type="number" id="m-p-ip"></div>
            <div>승리<input type="number" id="m-p-win"></div>
        </div>
        <button class="btn" style="background:var(--p);" id="btnUpdateStat">저장</button>
        <button class="btn" style="background:#666;" onclick="closeModal()">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", 
        authDomain: "busan260501-147bb.firebaseapp.com", 
        projectId: "busan260501-147bb", 
        appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let uData = null, uid = null, currentChatPartnerId = null, chatUnsub = null;

    // 알림 권한 체크 (안전한 방식)
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }

    function pushNoti(title, body) {
        if (Notification.permission === "granted" && document.visibilityState !== "visible") {
            try { new Notification(title, { body }); } catch(e) {}
        }
    }

    // --- 전역 함수 등록 ---
    window.toggleAuth = () => {
        document.getElementById('login-box').classList.toggle('hidden');
        document.getElementById('join-box').classList.toggle('hidden');
    };

    window.showSec = (id) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
    };

    window.switchSubTab = (type) => {
        document.getElementById('sub-board-view').classList.toggle('hidden', type !== 'board');
        document.getElementById('sub-chat-list-view').classList.toggle('hidden', type !== 'chat');
        document.getElementById('sub-chat-room-view').classList.add('hidden');
        document.getElementById('btn-sub-board').style.background = (type === 'board') ? '#072754' : '#ccc';
        document.getElementById('btn-sub-chat').style.background = (type === 'chat') ? '#072754' : '#ccc';
        if(type === 'chat') { loadChatUserList(); document.getElementById('badge-main-chat').style.display = "none"; }
    };

    window.changeStatTab = (t) => {
        document.getElementById('h-table').classList.toggle('hidden', t === 'p');
        document.getElementById('p-table').classList.toggle('hidden', t === 'h');
        document.getElementById('btn-tab-h').style.background = (t === 'h') ? '#072754' : '#ccc';
        document.getElementById('btn-tab-p').style.background = (t === 'p') ? '#072754' : '#ccc';
    };

    window.closeModal = () => document.getElementById('stat-modal').classList.add('hidden');
    
    window.openMyStat = () => { 
        document.getElementById('m-ab').value = uData.ab || 0; 
        document.getElementById('m-hit').value = uData.hit || 0; 
        document.getElementById('m-hr').value = uData.hr || 0;
        document.getElementById('m-p-er').value = uData.p_er || 0; 
        document.getElementById('m-p-ip').value = uData.p_ip || 0; 
        document.getElementById('m-p-win').value = uData.p_win || 0;
        document.getElementById('stat-modal').classList.remove('hidden'); 
    };

    window.openChatRoom = (pid, pname) => {
        currentChatPartnerId = pid;
        const ub = document.getElementById(`ubadge-${pid}`); if(ub) ub.style.display = "none";
        document.getElementById('chat-target-name').innerText = pname;
        document.getElementById('sub-chat-list-view').classList.add('hidden');
        document.getElementById('sub-chat-room-view').classList.remove('hidden');
        if(chatUnsub) chatUnsub();
        chatUnsub = onSnapshot(query(collection(db, "chats"), where("team", "==", uData.team), orderBy("time", "asc")), (snaps) => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            snaps.forEach(d => {
                const c = d.data();
                if((c.sender === uid && c.receiver === currentChatPartnerId) || (c.sender === currentChatPartnerId && c.receiver === uid)) {
                    list.innerHTML += `<div class="msg ${c.sender === uid ? 'me' : 'you'}">${c.msg}</div>`;
                }
            });
            list.scrollTop = list.scrollHeight;
        });
    };

    window.closeChatRoom = () => { 
        document.getElementById('sub-chat-room-view').classList.add('hidden'); 
        document.getElementById('sub-chat-list-view').classList.remove('hidden'); 
        currentChatPartnerId = null; 
    };

    window.handleApprove = async (id, ok) => { 
        if(ok) await updateDoc(doc(db, "users", id), { approved: true }); 
        else await deleteDoc(doc(db, "users", id)); 
    };

    // --- 이벤트 핸들러 ---
    document.getElementById('btnLogin').onclick = async () => {
        const e = document.getElementById('id-email').value, p = document.getElementById('id-pw').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("로그인 실패: " + err.message); }
    };

    document.getElementById('btnJoin').onclick = async () => {
        const name = document.getElementById('join-name').value, email = document.getElementById('join-email').value, pw = document.getElementById('join-pw').value, team = document.getElementById('join-team').value, role = document.getElementById('join-role').value;
        try {
            const uc = await createUserWithEmailAndPassword(auth, email, pw);
            await setDoc(doc(db, "users", uc.user.uid), { name, email, team, role, approved: (role === 'manager'), backnum: "", ab:0, hit:0, hr:0, p_er:0, p_ip:0, p_win:0 });
            alert("가입 요청 완료!"); signOut(auth); location.reload();
        } catch(e) { alert("가입 실패: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            uid = user.uid; 
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()) {
                uData = s.data(); 
                if(!uData.approved) { alert("승인 대기 중입니다."); signOut(auth); return; }
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('teamNameDisp').innerText = uData.team;
                if(uData.role === 'manager') { 
                    document.querySelectorAll('.mgr-only').forEach(el => el.style.display = 'block');
                    document.getElementById('mgr-req-card').style.display = 'block';
                    loadRequests(); 
                }
                document.getElementById('my-name').value = uData.name || "";
                document.getElementById('my-backnum').value = uData.backnum || "";
                initRealtime();
            }
        } else {
            document.getElementById('auth-page').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function initRealtime() {
        onSnapshot(query(collection(db, "sch"), where("team", "==", uData.team), orderBy("date", "asc")), (snaps) => {
            const list = document.getElementById('schedule-list'); list.innerHTML = "";
            snaps.docChanges().forEach(change => { if(change.type === "added" && !change.doc.metadata.hasPendingWrites) pushNoti("📅 새 일정", change.doc.data().text); });
            snaps.forEach(d => { list.innerHTML += `<div style="padding:10px; border-left:4px solid var(--a); background:#fff; margin-bottom:5px;"><b>${d.data().date}</b> ${d.data().text}</div>`; });
        });

        onSnapshot(query(collection(db, "board"), where("team", "==", uData.team), orderBy("time", "desc")), (snaps) => {
            const list = document.getElementById('board-list'); list.innerHTML = "";
            snaps.docChanges().forEach(change => { if(change.type === "added" && !change.doc.metadata.hasPendingWrites && change.doc.data().name !== uData.name) pushNoti("📋 게시판", change.doc.data().msg); });
            snaps.forEach(d => { const b = d.data(); list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${b.name}</b>: ${b.msg}</div>`; });
        });

        onSnapshot(query(collection(db, "users"), where("team", "==", uData.team), where("approved", "==", true)), (snaps) => {
            const hL = document.getElementById('h-list'), pL = document.getElementById('p-list'), uL = document.getElementById('player-list');
            hL.innerHTML = ""; pL.innerHTML = ""; uL.innerHTML = "";
            snaps.forEach(d => {
                const p = d.data(); const avg = p.ab > 0 ? (p.hit/p.ab).toFixed(3) : ".000"; const era = p.p_ip > 0 ? ((p.p_er*7)/p.p_ip).toFixed(2) : "0.00";
                hL.innerHTML += `<tr><td>${p.backnum||'-'}</td><td>${p.name}</td><td>${avg}</td><td>${p.hit}</td><td>${p.hr}</td></tr>`;
                pL.innerHTML += `<tr><td>${p.backnum||'-'}</td><td>${p.name}</td><td>${era}</td><td>${p.p_win}</td><td>${p.p_ip}</td></tr>`;
                uL.innerHTML += `<div class="req-item">No.${p.backnum||'??'} <b>${p.name}</b> (${p.role})</div>`;
            });
        });

        onSnapshot(query(collection(db, "lineup"), where("team", "==", uData.team)), (snaps) => {
            document.querySelectorAll('.player-node p').forEach(p => p.innerText = "-");
            snaps.forEach(d => { const l = d.data(); const el = document.getElementById('txt-'+l.pos); if(el) el.innerText = l.name; });
        });

        onSnapshot(query(collection(db, "chats"), where("team", "==", uData.team), where("receiver", "==", uid)), (snaps) => {
            snaps.docChanges().forEach(change => {
                if(change.type === "added" && !change.doc.metadata.hasPendingWrites && currentChatPartnerId !== change.doc.data().sender) {
                    pushNoti("💬 새 메시지", change.doc.data().msg);
                    document.getElementById('badge-main-chat').style.display = "block";
                    const ub = document.getElementById(`ubadge-${change.doc.data().sender}`); if(ub) ub.style.display = "block";
                }
            });
        });
    }

    async function loadChatUserList() {
        const listDiv = document.getElementById('chat-user-list'); listDiv.innerHTML = "";
        const snaps = await getDocs(query(collection(db, "users"), where("team", "==", uData.team), where("approved", "==", true)));
        snaps.forEach(d => {
            if(d.id === uid) return;
            const user = d.data();
            const item = document.createElement('div'); item.className = "req-item";
            item.innerHTML = `<div><b>${user.name}</b> <div id="ubadge-${d.id}" class="user-unread"></div></div><span class="material-icons">chevron_right</span>`;
            item.onclick = () => openChatRoom(d.id, user.name);
            listDiv.appendChild(item);
        });
    }

    function loadRequests() {
        onSnapshot(query(collection(db, "users"), where("team", "==", uData.team), where("approved", "==", false)), (snaps) => {
            const list = document.getElementById('request-list'); list.innerHTML = "";
            snaps.forEach(d => {
                list.innerHTML += `<div class="req-item"><span>${d.data().name}</span><div>
                    <button onclick="handleApprove('${d.id}', true)" style="background:#2e7d32; color:white; border:none; padding:5px; border-radius:5px;">승인</button>
                    <button onclick="handleApprove('${d.id}', false)" style="background:#666; color:white; border:none; padding:5px; border-radius:5px; margin-left:5px;">거절</button>
                </div></div>`;
            });
        });
    }

    document.getElementById('btnPost').onclick = async () => { await addDoc(collection(db, "board"), { team: uData.team, name: uData.name, msg: document.getElementById('board-msg').value, time: Date.now() }); document.getElementById('board-msg').value=""; };
    document.getElementById('btnChatSend').onclick = async () => {
        const msg = document.getElementById('chat-input').value; if(!msg) return;
        await addDoc(collection(db, "chats"), { team: uData.team, sender: uid, receiver: currentChatPartnerId, name: uData.name, msg, time: Date.now() });
        document.getElementById('chat-input').value = "";
    };
    document.getElementById('btnUpdateProfile').onclick = async () => {
        await updateDoc(doc(db, "users", uid), { name: document.getElementById('my-name').value, backnum: document.getElementById('my-backnum').value });
        alert("저장 완료");
    };
    document.getElementById('btnAddSch').onclick = async () => { await addDoc(collection(db, "sch"), { team: uData.team, date: document.getElementById('sch-date').value, text: document.getElementById('sch-text').value }); };
    document.getElementById('btnUpdateStat').onclick = async () => {
        const up = { ab: Number(document.getElementById('m-ab').value), hit: Number(document.getElementById('m-hit').value), hr: Number(document.getElementById('m-hr').value), p_er: Number(document.getElementById('m-p-er').value), p_ip: Number(document.getElementById('m-p-ip').value), p_win: Number(document.getElementById('m-p-win').value) };
        await updateDoc(doc(db, "users", uid), up); uData = {...uData, ...up}; closeModal();
    };
    document.getElementById('btnAddLineup').onclick = async () => {
        const pos = document.getElementById('l-pos-select').value, name = document.getElementById('l-name').value;
        const q = query(collection(db, "lineup"), where("team", "==", uData.team), where("pos", "==", pos));
        const snaps = await getDocs(q); snaps.forEach(async d => await deleteDoc(doc(db, "lineup", d.id)));
        await addDoc(collection(db, "lineup"), { team: uData.team, pos, name });
    };
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
