<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GS MASTER - Team List Fix</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #0747a6; --p-light: #e3efff; --a: #d31145; --bg: #f4f7fa; --card: #ffffff; --text: #1d1d1f; --text-sub: #636e72; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); color: var(--text); }
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        header { flex-shrink: 0; background: var(--card); border-bottom: 1px solid #e1e4e8; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding-top: calc(18px + env(safe-area-inset-top)); }
        header b { font-size: 20px; color: var(--p); font-weight: 800; }

        #main-app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .app-sec { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }

        .card { background: var(--card); border-radius: 20px; margin: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
        h3 { font-size: 17px; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; color: var(--p); }

        input, select { background: #f1f3f5; border: 1px solid transparent; border-radius: 12px; padding: 12px; margin-bottom: 10px; width: 100%; font-size: 15px; outline: none; }
        .btn { width: 100%; height: 50px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); color: white; }
        .btn-gray { background: #e9ecef; color: #495057; }

        .nav { position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 10px; right: 10px; height: 68px; background: white; border-radius: 20px; display: flex; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-item span { font-size: 9px; font-weight: 700; margin-top: 4px; }
        
        .list-item { padding: 15px; background: white; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; align-items: center; }
        .badge-wait { font-size: 10px; background: #ffeaa7; color: #d35400; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="auth-page" class="card" style="margin-top:80px;">
    <h2 style="text-align:center; color:var(--p);">GS MASTER</h2>
    <input type="email" id="id-email" placeholder="이메일">
    <input type="password" id="id-pw" placeholder="비밀번호">
    <button class="btn btn-p" id="btnLogin">로그인</button>
</div>

<div id="main-app" class="hidden">
    <header><b id="teamNameDisp">로딩중...</b><span class="material-icons" id="btnLogout">logout</span></header>

    <section id="sec-home" class="app-sec">
        <div class="card"><h3>게시물 관리</h3><div id="board-list"></div></div>
    </section>

    <section id="sec-players" class="app-sec hidden">
        <div class="card mgr-only" style="display:none; border:2px solid var(--p);">
            <h3>승인 대기 중인 인원</h3>
            <div id="approval-list"></div>
        </div>
        <div class="card">
            <h3>내 정보</h3>
            <input type="text" id="my-name"><input type="number" id="my-backnum">
            <button class="btn btn-p" id="btnUpdateProfile">정보 수정</button>
        </div>
        <div class="card">
            <h3>우리 팀원들</h3>
            <div id="player-list"></div>
        </div>
    </section>

    <section id="sec-stats" class="app-sec hidden"><div class="card"><h3>기록 로딩 중...</h3><div id="h-list"></div></div></section>
    <section id="sec-chat" class="app-sec hidden"><div class="card"><h3>대화 가능한 팀원</h3><div id="chat-user-list"></div></div></section>
    <section id="sec-schedule" class="app-sec hidden"><div class="card"><h3>일정</h3><div id="sch-list"></div></div></section>

    <nav class="nav">
        <div class="nav-item active" id="nav-home"><span class="material-icons">home</span><span>홈</span></div>
        <div class="nav-item" id="nav-schedule"><span class="material-icons">event</span><span>일정</span></div>
        <div class="nav-item" id="nav-stats"><span class="material-icons">analytics</span><span>기록</span></div>
        <div class="nav-item" id="nav-chat"><span class="material-icons">forum</span><span>채팅</span></div>
        <div class="nav-item" id="nav-players"><span class="material-icons">people</span><span>팀원</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", authDomain: "busan260501-147bb.firebaseapp.com", projectId: "busan260501-147bb", appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" };
    const app = initializeApp(cfg); const db = getFirestore(app); const auth = getAuth(app);
    let uData = null, uid = null;

    onAuthStateChanged(auth, (user) => {
        if(user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (snap) => {
                if(snap.exists()) {
                    uData = snap.data();
                    document.getElementById('auth-page').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('teamNameDisp').innerText = uData.team;
                    if(uData.role === 'manager') document.querySelectorAll('.mgr-only').forEach(e => e.style.display = 'block');
                    loadTeamData();
                }
            });
        }
    });

    function loadTeamData() {
        // 모든 팀원 불러오기 (승인 여부 상관없이 일단 리스트업)
        const q = query(collection(db, "users"), where("team", "==", uData.team));
        onSnapshot(q, (s) => {
            const pl = document.getElementById('player-list'); pl.innerHTML = "";
            const cl = document.getElementById('chat-user-list'); cl.innerHTML = "";
            const al = document.getElementById('approval-list'); if(al) al.innerHTML = "";

            s.forEach(d => {
                const p = d.data();
                
                // 1. 승인된 팀원 명단 (일반 리스트)
                if(p.approved) {
                    pl.innerHTML += `<div class="list-item">
                        <span><b>${p.name}</b> (No.${p.backnum||'?'})</span>
                        ${uData.role==='manager' && p.uid!==uid ? `<b style="color:red" onclick="window.kick('${p.uid}')">방출</b>` : ''}
                    </div>`;
                    
                    if(p.uid !== uid) {
                        cl.innerHTML += `<div class="list-item" onclick="alert('${p.name}님과 채팅 연결...')"><b>${p.name}</b></div>`;
                    }
                } 
                // 2. 미승인 인원 (감독에게만 보임)
                else if(uData.role === 'manager') {
                    al.innerHTML += `<div class="list-item" style="background:#fff9db;">
                        <span>${p.name} <span class="badge-wait">대기중</span></span>
                        <button class="btn btn-p" style="width:60px; height:30px; font-size:12px;" onclick="window.approve('${p.uid}')">승인</button>
                    </div>`;
                }
            });
        });
    }

    // 승인 함수
    window.approve = async (id) => {
        await updateDoc(doc(db, "users", id), { approved: true });
        alert("팀원으로 승인되었습니다.");
    };

    // 방출 함수
    window.kick = async (id) => {
        if(confirm("정말 이 팀원을 방출하시겠습니까?")) {
            await updateDoc(doc(db, "users", id), { team: "무소속", approved: false });
        }
    };

    // 정보 수정
    document.getElementById('btnUpdateProfile').onclick = async () => {
        const n = document.getElementById('my-name').value;
        const b = document.getElementById('my-backnum').value;
        await updateDoc(doc(db, "users", uid), { name: n, backnum: b });
        alert("정보가 수정되었습니다.");
    };

    // 탭 전환
    const ids = ['home', 'schedule', 'stats', 'chat', 'players'];
    ids.forEach(id => document.getElementById('nav-'+id).onclick = () => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+id).classList.add('active');
    });

    document.getElementById('btnLogin').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('id-email').value, document.getElementById('id-pw').value);
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
