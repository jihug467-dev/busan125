<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GS MASTER</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f0f2f5; --card: #ffffff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        header { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #main-app { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        
        /* 라인업 */
        .field { position: relative; width: 100%; aspect-ratio: 1; background: #388e3c; border: 3px solid white; border-radius: 10px; margin-top: 10px; }
        .p-node { position: absolute; width: 42px; height: 42px; background: white; border: 2.5px solid var(--p); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; transform: translate(-50%, -50%); color: var(--p); }
        .p-node b { font-size: 8px; color: var(--a); }

        /* 채팅 */
        .chat-win { height: 200px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; }
        .m-msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .m-me { background: var(--p); color: white; align-self: flex-end; }
        .m-you { background: #e9e9eb; color: #333; align-self: flex-start; }

        /* 하단바 */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #888; cursor: pointer; }
        .nav-btn.active { color: var(--p); }

        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        .btn { background: var(--p); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-page" style="padding: 30px;">
    <h1 style="text-align:center; color:var(--p);">GS MASTER</h1>
    <div id="login-form" class="card">
        <input type="email" id="email" placeholder="이메일">
        <input type="password" id="pw" placeholder="비밀번호">
        <button class="btn" id="btnLogin">로그인</button>
        <p style="text-align:center; font-size:13px; color:#888; margin-top:20px; cursor:pointer;" id="toJoin">계정이 없으신가요? 회원가입</p>
    </div>
    <div id="join-form" class="card hidden">
        <input type="text" id="j-name" placeholder="이름">
        <input type="text" id="j-team" placeholder="팀명">
        <input type="email" id="j-email" placeholder="이메일">
        <input type="password" id="j-pw" placeholder="비밀번호">
        <select id="j-role"><option value="player">선수</option><option value="manager">감독</option></select>
        <button class="btn" style="background:var(--a)" id="btnJoin">가입하기</button>
        <p style="text-align:center; font-size:13px; color:#888; margin-top:20px; cursor:pointer;" id="toLogin">로그인으로 돌아가기</p>
    </div>
</div>

<div id="main-app" class="hidden">
    <header><span id="head-team">TEAM</span> <span class="material-icons" id="btnLogout" style="cursor:pointer;">logout</span></header>
    
    <div id="s-home" class="sec">
        <div class="card" id="mgr-req" style="display:none; border:2px solid var(--a);">
            <b>승인 대기</b><div id="req-list"></div>
        </div>
        <div class="card">
            <h3>📢 팀 공지사항</h3>
            <div id="notice-list"></div>
            <div class="mgr-only hidden"><textarea id="n-input" placeholder="공지 입력..."></textarea><button class="btn" id="btnNotice">등록</button></div>
        </div>
        <div class="card">
            <h3>💬 팀 채팅</h3>
            <div id="chat-win" class="chat-win"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="chat-msg" style="margin:0;">
                <button class="btn" style="width:70px;" id="btnChat">전송</button>
            </div>
        </div>
    </div>

    <div id="s-stat" class="sec hidden">
        <div class="card">
            <h3>🏆 선수단 기록</h3>
            <div id="team-stat-list"></div>
        </div>
        <div class="card">
            <h3>내 기록 업데이트</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <input type="number" id="m-ab" placeholder="타수">
                <input type="number" id="m-hit" placeholder="안타">
            </div>
            <button class="btn" id="btnSaveStat">저장</button>
        </div>
    </div>

    <div id="s-lineup" class="sec hidden">
        <div class="card">
            <h3>오더지</h3>
            <div class="field">
                <div class="p-node" style="left:50%; top:65%;" id="pos-P"><b>P</b>-</div>
                <div class="p-node" style="left:50%; top:88%;" id="pos-C"><b>C</b>-</div>
                <div class="p-node" style="left:82%; top:58%;" id="pos-1B"><b>1B</b>-</div>
                <div class="p-node" style="left:70%; top:35%;" id="pos-2B"><b>2B</b>-</div>
                <div class="p-node" style="left:30%; top:35%;" id="pos-SS"><b>SS</b>-</div>
                <div class="p-node" style="left:18%; top:58%;" id="pos-3B"><b>3B</b>-</div>
                <div class="p-node" style="left:15%; top:15%;" id="pos-LF"><b>LF</b>-</div>
                <div class="p-node" style="left:50%; top:10%;" id="pos-CF"><b>CF</b>-</div>
                <div class="p-node" style="left:85%; top:15%;" id="pos-RF"><b>RF</b>-</div>
            </div>
            <div class="mgr-only hidden" style="margin-top:15px;">
                <select id="l-pos"><option value="P">투수</option><option value="C">포수</option><option value="1B">1루수</option><option value="2B">2루수</option><option value="3B">3루수</option><option value="SS">유격수</option><option value="LF">좌익수</option><option value="CF">중견수</option><option value="RF">우익수</option></select>
                <input type="text" id="l-name" placeholder="이름"><button class="btn" id="btnLineup">배치</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-btn active" id="nav-home"><span class="material-icons">home</span>홈</div>
        <div class="nav-btn" id="nav-stat"><span class="material-icons">analytics</span>기록</div>
        <div class="nav-btn" id="nav-lineup"><span class="material-icons">reorder</span>라인업</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", authDomain: "busan260501-147bb.firebaseapp.com", projectId: "busan260501-147bb", appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" };
    const app = initializeApp(cfg); const db = getFirestore(app); const auth = getAuth(app);
    let uData = null, uid = null;

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            uid = user.uid; const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                uData = snap.data(); 
                if(!uData.approved) { alert("승인 대기 중"); signOut(auth); return; }
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('head-team').innerText = uData.team;
                if(uData.role==='manager') { document.querySelectorAll('.mgr-only').forEach(e=>e.classList.remove('hidden')); loadReqs(); }
                initRealtime();
            }
        } else {
            document.getElementById('auth-page').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function initRealtime() {
        onSnapshot(query(collection(db,"notice"), where("team","==",uData.team), orderBy("t","desc")), s => {
            const l = document.getElementById('notice-list'); l.innerHTML = "";
            s.forEach(d => l.innerHTML += `<p><b>[공지]</b> ${d.data().m}</p>`);
        });

        onSnapshot(query(collection(db,"users"), where("team","==",uData.team), where("approved","==",true)), s => {
            const l = document.getElementById('team-stat-list'); l.innerHTML = "";
            s.forEach(d => { 
                const p = d.data(); const avg = (p.hit/(p.ab||1)).toFixed(3);
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;"><span>${p.name}</span><b>${avg}</b></div>`;
                if(p.uid === uid) { document.getElementById('m-ab').value=p.ab; document.getElementById('m-hit').value=p.hit; }
            });
        });

        onSnapshot(query(collection(db,"chats"), where("team","==",uData.team), orderBy("t","asc")), s => {
            const w = document.getElementById('chat-win'); w.innerHTML = "";
            s.forEach(d => { const c=d.data(); w.innerHTML += `<div class="m-msg ${c.uid===uid?'m-me':'m-you'}"><small>${c.n}</small><br>${c.m}</div>`; });
            w.scrollTop = w.scrollHeight;
        });

        onSnapshot(query(collection(db,"lineup"), where("team","==",uData.team)), s => {
            document.querySelectorAll('.p-node').forEach(n => n.childNodes[1].textContent = "-");
            s.forEach(d => { const l=d.data(); if(document.getElementById('pos-'+l.pos)) document.getElementById('pos-'+l.pos).childNodes[1].textContent = l.name; });
        });
    }

    document.getElementById('btnLogin').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pw').value);
    document.getElementById('btnJoin').onclick = async () => {
        const n=document.getElementById('j-name').value, t=document.getElementById('j-team').value, r=document.getElementById('j-role').value;
        const uc = await createUserWithEmailAndPassword(auth, document.getElementById('j-email').value, document.getElementById('j-pw').value);
        await setDoc(doc(db,"users",uc.user.uid), { uid:uc.user.uid, name:n, team:t, role:r, approved:(r==='manager'), ab:0, hit:0 });
        location.reload();
    };
    document.getElementById('btnNotice').onclick = () => addDoc(collection(db,"notice"), { team:uData.team, m:document.getElementById('n-input').value, t:Date.now() });
    document.getElementById('btnChat').onclick = () => { if(document.getElementById('chat-msg').value) addDoc(collection(db,"chats"), { team:uData.team, uid, n:uData.name, m:document.getElementById('chat-msg').value, t:Date.now() }); document.getElementById('chat-msg').value=""; };
    document.getElementById('btnSaveStat').onclick = () => updateDoc(doc(db,"users",uid), { ab:Number(document.getElementById('m-ab').value), hit:Number(document.getElementById('m-hit').value) });
    document.getElementById('btnLineup').onclick = async () => {
        const p=document.getElementById('l-pos').value, n=document.getElementById('l-name').value;
        const q = await getDoc(doc(db,"lineup",uData.team+p)); await setDoc(doc(db,"lineup",uData.team+p), { team:uData.team, pos:p, name:n });
    };

    document.getElementById('toJoin').onclick = () => { document.getElementById('login-form').classList.add('hidden'); document.getElementById('join-form').classList.remove('hidden'); };
    document.getElementById('toLogin').onclick = () => { document.getElementById('login-form').classList.remove('hidden'); document.getElementById('join-form').classList.add('hidden'); };
    document.getElementById('nav-home').onclick = () => { document.querySelectorAll('.sec').forEach(s=>s.classList.add('hidden')); document.getElementById('s-home').classList.remove('hidden'); };
    document.getElementById('nav-stat').onclick = () => { document.querySelectorAll('.sec').forEach(s=>s.classList.add('hidden')); document.getElementById('s-stat').classList.remove('hidden'); };
    document.getElementById('nav-lineup').onclick = () => { document.querySelectorAll('.sec').forEach(s=>s.classList.add('hidden')); document.getElementById('s-lineup').classList.remove('hidden'); };
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(()=>location.reload());

    async function loadReqs() { onSnapshot(query(collection(db,"users"), where("team","==",uData.team), where("approved","==",false)), s => {
        const l=document.getElementById('req-list'); l.innerHTML="";
        s.forEach(d => l.innerHTML += `<div>${d.data().name} <button onclick="window.appv('${d.id}')">승인</button></div>`);
    }); }
    window.appv = (id) => updateDoc(doc(db,"users",id), { approved:true });
</script>
</body>
</html>
