<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GS MASTER - 야구 기록 및 라인업</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #0747a6; --p-light: #e3efff; --a: #d31145; --bg: #f4f7fa; --card: #ffffff; --text: #1d1d1f; --text-sub: #636e72; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); color: var(--text); }
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        header { flex-shrink: 0; background: var(--card); border-bottom: 1px solid #e1e4e8; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding-top: calc(18px + env(safe-area-inset-top)); }
        header b { font-size: 20px; color: var(--p); font-weight: 800; }

        #main-app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .app-sec { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }

        .card { background: var(--card); border-radius: 20px; margin: 15px; padding: 22px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
        h3 { font-size: 17px; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--p); }

        input, select, textarea { background: #f1f3f5; border: 1px solid transparent; border-radius: 12px; padding: 14px; margin-bottom: 12px; width: 100%; font-size: 15px; outline: none; }
        .btn { width: 100%; height: 52px; border-radius: 14px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); color: white; }
        .btn-gray { background: #e9ecef; color: #495057; }

        /* 라인업 전용 스타일 */
        .lineup-row { display: grid; grid-template-columns: 40px 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f3f5; }
        .lineup-num { font-weight: 800; color: var(--p); }
        .pos-badge { background: var(--p-light); color: var(--p); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; text-align: center; }

        .stat-card-v4 { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .rank1 { border: 2px solid var(--p); background: var(--p-light); }
        .stat-score { text-align: right; }
        .stat-score .main { font-size: 20px; font-weight: 800; color: var(--p); display: block; }

        .nav { position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 15px; right: 15px; height: 68px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; display: flex; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-item span { font-size: 10px; font-weight: 700; margin-top: 4px; }

        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index:3000; display:flex; justify-content:center; align-items:center; padding:20px; }
    </style>
</head>
<body>

<div id="auth-page" class="card" style="margin-top:80px;">
    <h2 style="text-align:center; color:var(--p);">GS MASTER</h2>
    <div id="login-box">
        <input type="email" id="id-email" placeholder="이메일 주소">
        <input type="password" id="id-pw" placeholder="비밀번호">
        <button class="btn btn-p" id="btnLogin">로그인하기</button>
        <p id="toggle-to-join" style="text-align:center; color:var(--text-sub); margin-top:25px; cursor:pointer;">계정 만들기</p>
    </div>
    <div id="join-box" class="hidden">
        <input type="text" id="join-name" placeholder="이름">
        <input type="email" id="join-email" placeholder="이메일">
        <input type="password" id="join-pw" placeholder="비밀번호">
        <input type="text" id="join-team" placeholder="팀 이름">
        <select id="join-role"><option value="player">선수</option><option value="manager">감독</option></select>
        <button class="btn btn-p" id="btnJoin">회원가입</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <header><b id="teamNameDisp">팀 이름</b><span class="material-icons" id="btnLogout" style="color:#adb5bd; cursor:pointer;">logout</span></header>

    <section id="sec-home" class="app-sec">
        <div class="card" id="mgr-req-card" style="display:none; border:2px solid var(--p);">
            <h3>가입 승인 대기</h3><div id="request-list"></div>
        </div>
        <div class="card">
            <h3>팀 일정</h3><div id="schedule-list"></div>
            <div class="mgr-only" style="display:none; margin-top:20px;"><input type="date" id="sch-date"><input type="text" id="sch-text" placeholder="일정 내용"><button class="btn btn-p" id="btnAddSch">추가</button></div>
        </div>
    </section>

    <section id="sec-lineup" class="app-sec hidden">
        <div class="card">
            <h3>오늘의 라인업</h3>
            <div id="lineup-display-list">
                </div>
            <div class="mgr-only" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <p style="font-size:13px; color:var(--p); font-weight:bold;">타순 및 포지션 설정</p>
                <div id="lineup-edit-area">
                    </div>
                <button class="btn btn-p" id="btnSaveLineup" style="margin-top:10px;">라인업 저장 및 공유</button>
            </div>
        </div>
    </section>

    <section id="sec-stats" class="app-sec hidden">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn btn-p" id="btn-tab-h" style="flex:1;">타자 순위</button>
                <button class="btn btn-gray" id="btn-tab-p" style="flex:1;">투수 순위</button>
            </div>
            <div id="h-stat-container"><div id="h-list-v2"></div></div>
            <div id="p-stat-container" class="hidden"><div id="p-list-v2"></div></div>
            <button class="btn btn-gray" id="btnOpenMyStat" style="margin-top:15px; color:var(--p); border:1px solid var(--p);">내 기록 수정</button>
        </div>
    </section>

    <section id="sec-players" class="app-sec hidden">
        <div class="card">
            <h3>내 정보</h3>
            <input type="text" id="my-name" placeholder="이름">
            <input type="number" id="my-backnum" placeholder="등번호">
            <button class="btn btn-p" id="btnUpdateProfile">저장</button>
        </div>
        <div class="card">
            <h3>팀원 명단</h3><div id="player-list"></div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" id="nav-home"><span class="material-icons">home</span><span>홈</span></div>
        <div class="nav-item" id="nav-lineup"><span class="material-icons">format_list_numbered</span><span>라인업</span></div>
        <div class="nav-item" id="nav-stats"><span class="material-icons">poll</span><span>기록</span></div>
        <div class="nav-item" id="nav-players"><span class="material-icons">people</span><span>팀원</span></div>
    </nav>
</div>

<div id="stat-modal" class="modal hidden">
    <div class="card" style="width:100%; max-width:400px;">
        <h3>기록 업데이트</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <div><small>타수</small><input type="number" id="m-ab"></div>
            <div><small>안타</small><input type="number" id="m-hit"></div>
            <div><small>홈런</small><input type="number" id="m-hr"></div>
            <div style="grid-column: span 2;"><small>이닝</small><input type="number" step="0.1" id="m-p-ip"></div>
            <div><small>자책점</small><input type="number" id="m-p-er"></div>
        </div>
        <button class="btn btn-p" id="btnUpdateStat">저장 완료</button>
        <button class="btn" id="btnCloseModal" style="background:none;">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg", authDomain: "busan260501-147bb.firebaseapp.com", projectId: "busan260501-147bb", appId: "1:322128107410:web:c6b8fbbda00a09fcae534b" };
    const app = initializeApp(cfg); const db = getFirestore(app); const auth = getAuth(app);
    let uData = null, uid = null, allPlayers = [];

    const positions = ["투수", "포수", "1루수", "2루수", "3루수", "유격수", "좌익수", "중견수", "우익수", "지명타자"];

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            uid = user.uid; const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                uData = snap.data();
                if(!uData.approved) { alert("승인 대기 중"); signOut(auth); return; }
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('teamNameDisp').innerText = uData.team;
                if(uData.role === 'manager') { 
                    document.querySelectorAll('.mgr-only').forEach(e => e.style.display = 'block');
                    setupLineupEditor();
                }
                initRealtime();
            }
        }
    });

    function setupLineupEditor() {
        const area = document.getElementById('lineup-edit-area');
        area.innerHTML = "";
        for(let i=1; i<=9; i++) {
            area.innerHTML += `
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <span style="width:25px; line-height:45px;">${i}</span>
                    <select id="edit-p-${i}" style="flex:1;"><option value="">선수 선택</option></select>
                    <select id="edit-pos-${i}" style="width:100px;">
                        ${positions.map(p => `<option value="${p}">${p}</option>`).join('')}
                    </select>
                </div>`;
        }
    }

    function initRealtime() {
        const today = new Date().toISOString().split('T')[0];
        // 일정 로드
        onSnapshot(query(collection(db, "sch"), where("team", "==", uData.team), where("date", ">=", today), orderBy("date", "asc")), s => {
            const l = document.getElementById('schedule-list'); l.innerHTML = s.empty ? "일정이 없습니다." : "";
            s.forEach(d => l.innerHTML += `<div style="padding:12px; background:#f8f9fa; border-radius:12px; margin-bottom:8px; border-left:4px solid var(--p);"><b>${d.data().date}</b><br>${d.data().text}</div>`);
        });

        // 선수 및 기록 로드
        onSnapshot(query(collection(db, "users"), where("team", "==", uData.team), where("approved", "==", true)), s => {
            allPlayers = []; s.forEach(d => allPlayers.push(d.data()));
            renderStats(allPlayers);
            updateLineupSelectors();
        });

        // 라인업 로드 (실시간)
        onSnapshot(doc(db, "lineups", uData.team), (docSnap) => {
            const disp = document.getElementById('lineup-display-list');
            if (docSnap.exists()) {
                const data = docSnap.data().list;
                disp.innerHTML = data.map(item => `
                    <div class="lineup-row">
                        <span class="lineup-num">${item.order}번</span>
                        <span><b>${item.name}</b></span>
                        <span class="pos-badge">${item.pos}</span>
                    </div>
                `).join('');
            } else {
                disp.innerHTML = "<p style='color:#999;'>등록된 라인업이 없습니다.</p>";
            }
        });
    }

    function updateLineupSelectors() {
        if(uData.role !== 'manager') return;
        for(let i=1; i<=9; i++) {
            const sel = document.getElementById(`edit-p-${i}`);
            const currentVal = sel.value;
            sel.innerHTML = `<option value="">선수 선택</option>` + allPlayers.map(p => `<option value="${p.uid}">${p.name}</option>`).join('');
            sel.value = currentVal;
        }
    }

    function renderStats(players) {
        const hL = document.getElementById('h-list-v2'), pL = document.getElementById('p-list-v2'), uL = document.getElementById('player-list');
        hL.innerHTML = ""; pL.innerHTML = ""; uL.innerHTML = "";

        // 타율 순
        [...players].sort((a,b) => (b.hit/(a.ab||1)) - (a.hit/(a.ab||1))).forEach((p, i) => {
            const avg = p.ab > 0 ? (p.hit/p.ab).toFixed(3) : ".000";
            hL.innerHTML += `<div class="stat-card-v4 ${i===0?'rank1':''}">
                <div><b>${p.name}</b><small>${p.ab}타수 ${p.hit}안타</small></div>
                <div class="stat-score"><span class="main">${avg}</span></div>
            </div>`;
        });

        // 방어율 순
        players.filter(p => p.p_ip > 0).sort((a,b) => ((a.p_er*7)/a.p_ip) - ((b.p_er*7)/b.p_ip)).forEach((p, i) => {
            const era = ((p.p_er*7)/p.p_ip).toFixed(2);
            pL.innerHTML += `<div class="stat-card-v4 ${i===0?'rank1':''}">
                <div><b>${p.name}</b><small>${p.p_ip}이닝 ${p.p_er}자책</small></div>
                <div class="stat-score"><span class="main" style="color:var(--a)">${era}</span></div>
            </div>`;
        });

        players.forEach(p => {
            uL.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee;">
                <span><b>${p.name}</b> (No.${p.backnum||'?'})</span>
                ${uData.role==='manager'&&p.uid!==uid?`<button onclick="window.kick('${p.uid}')" style="color:var(--a); border:none; background:none;">방출</button>`:''}
            </div>`;
        });
    }

    // 라인업 저장 로직
    document.getElementById('btnSaveLineup').onclick = async () => {
        const lineupList = [];
        for(let i=1; i<=9; i++) {
            const pUid = document.getElementById(`edit-p-${i}`).value;
            const pos = document.getElementById(`edit-pos-${i}`).value;
            if(!pUid) continue;
            const pName = allPlayers.find(p => p.uid === pUid).name;
            lineupList.push({ order: i, name: pName, pos: pos });
        }
        if(lineupList.length === 0) return alert("선수를 선택해주세요.");
        await setDoc(doc(db, "lineups", uData.team), { list: lineupList });
        alert("라인업이 저장되었습니다!");
    };

    // 기본 버튼들
    document.getElementById('btnLogin').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('id-email').value, document.getElementById('id-pw').value).catch(()=>alert("로그인 실패"));
    document.getElementById('btnJoin').onclick = async () => {
        const n=document.getElementById('join-name').value, e=document.getElementById('join-email').value, p=document.getElementById('join-pw').value, t=document.getElementById('join-team').value, r=document.getElementById('join-role').value;
        const uc = await createUserWithEmailAndPassword(auth, e, p);
        await setDoc(doc(db, "users", uc.user.uid), { uid:uc.user.uid, name:n, email:e, team:t, role:r, approved:(r==='manager'), ab:0, hit:0, hr:0, p_er:0, p_ip:0 });
        location.reload();
    };
    document.getElementById('btnUpdateStat').onclick = async () => {
        const up = { ab:Number(document.getElementById('m-ab').value), hit:Number(document.getElementById('m-hit').value), hr:Number(document.getElementById('m-hr').value), p_ip:Number(document.getElementById('m-p-ip').value), p_er:Number(document.getElementById('m-p-er').value) };
        await updateDoc(doc(db, "users", uid), up); document.getElementById('stat-modal').classList.add('hidden');
    };
    
    document.getElementById('nav-home').onclick = () => showSec('home');
    document.getElementById('nav-lineup').onclick = () => showSec('lineup');
    document.getElementById('nav-stats').onclick = () => showSec('stats');
    document.getElementById('nav-players').onclick = () => showSec('players');
    document.getElementById('btnOpenMyStat').onclick = () => document.getElementById('stat-modal').classList.remove('hidden');
    document.getElementById('btnCloseModal').onclick = () => document.getElementById('stat-modal').classList.add('hidden');
    document.getElementById('btnLogout').onclick = () => signOut(auth).then(()=>location.reload());
    document.getElementById('toggle-to-join').onclick = () => { document.getElementById('login-box').classList.add('hidden'); document.getElementById('join-box').classList.remove('hidden'); };

    function showSec(id) {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + id).classList.add('active');
    }

    function loadRequests() {
        onSnapshot(query(collection(db,"users"), where("team","==",uData.team), where("approved","==",false)), s => {
            const l=document.getElementById('request-list'); l.innerHTML = "";
            s.forEach(d => {
                const dv = document.createElement('div'); dv.style.display="flex"; dv.style.justifyContent="space-between"; dv.style.margin="10px 0";
                dv.innerHTML = `<span>${d.data().name}</span> <button class="btn btn-p" style="width:60px; height:32px; font-size:12px;">승인</button>`;
                dv.querySelector('button').onclick = () => updateDoc(doc(db,"users",d.id), { approved:true });
                l.appendChild(dv);
            });
        });
    }
</script>
</body>
</html>
