<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Slam Master - Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #072754; --a: #d31145; --field: #387038; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 헤더 및 사이드 메뉴 */
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .side-menu.active { left: 0; }
        .menu-header { background: var(--p); color: white; padding: 20px; font-weight: bold; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* 야구장 전략판 */
        .field-container { position: relative; width: 100%; height: 350px; background: var(--field); border-radius: 15px; border: 4px solid #fff; margin-top: 10px; }
        .player-slot { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.9); border-radius: 50%; border: 2px solid var(--p); font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: move; }

        /* 네비게이션 */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 150; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #999; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--p); }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-p { background: var(--p); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        
        /* 선수 명단 스타일 */
        .player-list-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .player-img { width: 45px; height: 45px; background: #ddd; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<!-- 사이드 메뉴 (햄버거) -->
<div id="sideMenu" class="side-menu">
    <div class="menu-header">MENU</div>
    <div class="menu-item" onclick="showSec('players')"><span class="material-icons">groups</span> 전체 선수 명단</div>
    <div class="menu-item" onclick="showSec('stats')"><span class="material-icons">insights</span> 개인 기록실</div>
    <div class="menu-item" onclick="showSec('profile')"><span class="material-icons">person</span> 내 프로필 / 탈퇴</div>
    <div class="menu-item" style="color:red" onclick="handleLogout()"><span class="material-icons">logout</span> 로그아웃</div>
</div>

<!-- 앱 헤더 -->
<header id="appHeader" class="hidden">
    <span class="material-icons" onclick="toggleMenu()">menu</span>
    <span id="headerTitle">GRAND SLAM</span>
    <span class="material-icons" onclick="showSec('chat')">chat</span>
</header>

<!-- 인증 섹션 -->
<div id="page-auth">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>로그인 / 가입</h2>
        <input type="email" id="auth-email" placeholder="이메일">
        <input type="password" id="auth-pw" placeholder="비밀번호">
        <div id="signup-box" class="hidden">
            <select id="auth-role" onchange="toggleRoleUI()">
                <option value="player">선수 (팀 검색)</option>
                <option value="manager">감독 (팀 생성)</option>
            </select>
            <input type="text" id="reg-team" class="mgr-ui hidden" placeholder="팀 이름 입력">
            <div class="plr-ui">
                <div style="display:flex; gap:5px;"><input type="text" id="search-team" placeholder="팀 이름 검색"><button onclick="findTeam()">검색</button></div>
                <div id="team-res" style="font-size:12px; color:blue; margin:5px;"></div>
            </div>
        </div>
        <button class="btn-p" id="btn-auth" onclick="processAuth()">로그인</button>
        <p onclick="toggleAuth()" style="cursor:pointer; font-size:13px; color:#666;" id="switch-txt">계정이 없으신가요? 회원가입</p>
    </div>
</div>

<!-- 메인 섹션 -->
<div id="page-main" class="hidden">
    <!-- 홈 (라인업/공지) -->
    <section id="sec-home" class="app-sec">
        <div class="card">
            <h4>⚾ 오늘의 라인업 (감독 배치)</h4>
            <div class="field-container" id="baseball-field">
                <div class="player-slot" style="bottom:20px; left:45%;" id="pos-C">C<br>-</div>
                <div class="player-slot" style="bottom:110px; left:45%;" id="pos-P">P<br>-</div>
                <div class="player-slot" style="bottom:160px; right:15%;" id="pos-1B">1B<br>-</div>
                <div class="player-slot" style="top:80px; right:25%;" id="pos-2B">2B<br>-</div>
                <div class="player-slot" style="top:80px; left:25%;" id="pos-SS">SS<br>-</div>
                <div class="player-slot" style="bottom:160px; left:15%;" id="pos-3B">3B<br>-</div>
            </div>
            <button class="btn-p mgr-ui hidden" style="margin-top:10px" onclick="saveLineup()">라인업 저장</button>
        </div>
    </section>

    <!-- 선수 명단 -->
    <section id="sec-players" class="app-sec hidden">
        <div class="card">
            <h3>👥 전체 선수 명단</h3>
            <div id="full-player-list"></div>
        </div>
    </section>

    <!-- 일정 관리 -->
    <section id="sec-cal" class="app-sec hidden">
        <div class="card">
            <h3>📅 경기 일정</h3>
            <div id="calendar-view" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px; text-align:center;"></div>
            <div id="mgr-schedule-ui" class="mgr-ui hidden">
                <hr>
                <input type="text" id="sch-opponent" placeholder="상대팀">
                <input type="text" id="sch-loc" placeholder="장소">
                <button class="btn-p" onclick="saveSchedule()">일정 등록</button>
            </div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showSec('home')"><span class="material-icons">home</span>홈</div>
        <div class="nav-item" onclick="showSec('cal')"><span class="material-icons">calendar_month</span>일정</div>
        <div class="nav-item" onclick="toggleMenu()"><span class="material-icons">menu</span>메뉴</div>
    </nav>
</div>

<!-- 파이어베이스 모듈 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg",
        authDomain: "busan260501-147bb.firebaseapp.com",
        projectId: "busan260501-147bb",
        storageBucket: "busan260501-147bb.firebasestorage.app",
        messagingSenderId: "322128107410",
        appId: "1:322128107410:web:c6b8fbbda00a09fcae534b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let isLogin = true;
    let selectedTeam = "";
    let selectedMgr = "";
    let userData = null;

    // --- 인증 로직 ---
    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('signup-box').classList.toggle('hidden', isLogin);
        document.getElementById('btn-auth').innerText = isLogin ? "로그인" : "회원가입";
        document.getElementById('switch-txt').innerText = isLogin ? "계정이 없으신가요? 회원가입" : "이미 계정이 있나요? 로그인";
    };

    window.toggleRoleUI = () => {
        const role = document.getElementById('auth-role').value;
        document.querySelectorAll('.mgr-ui').forEach(el => el.classList.toggle('hidden', role !== 'manager'));
        document.querySelector('.plr-ui').classList.toggle('hidden', role === 'manager');
    };

    window.findTeam = async () => {
        const name = document.getElementById('search-team').value;
        const q = query(collection(db, "users"), where("role", "==", "manager"), where("teamName", "==", name));
        const qs = await getDocs(q);
        if(qs.empty) return alert("팀을 찾을 수 없습니다.");
        qs.forEach(doc => {
            selectedTeam = doc.data().teamName;
            selectedMgr = doc.id;
            document.getElementById('team-res').innerText = `선택된 팀: ${selectedTeam}`;
        });
    };

    window.processAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pw = document.getElementById('auth-pw').value;
        if(isLogin) {
            try { await signInWithEmailAndPassword(auth, email, pw); } catch(e) { alert(e.message); }
        } else {
            const role = document.getElementById('auth-role').value;
            const team = role === 'manager' ? document.getElementById('reg-team').value : selectedTeam;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pw);
                await setDoc(doc(db, "users", res.user.uid), {
                    email, role, teamName: team, mgrId: (role === 'manager' ? res.user.uid : selectedMgr), approved: (role === 'manager')
                });
                alert("가입 성공! 로그인을 시도하세요."); location.reload();
            } catch(e) { alert(e.message); }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const udoc = await getDoc(doc(db, "users", user.uid));
            if(!udoc.exists()) return;
            userData = udoc.data();
            if(!userData.approved) { alert("승인 대기 중입니다."); await signOut(auth); return; }
            
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-main').classList.remove('hidden');
            document.getElementById('appHeader').classList.remove('hidden');
            document.getElementById('headerTitle').innerText = userData.teamName;
            
            if(userData.role === 'manager') document.querySelectorAll('.mgr-ui').forEach(el => el.classList.remove('hidden'));
            
            loadLineup();
            loadPlayers();
            createCalendar();
        }
    });

    // --- 기능 로직 (선수 명단/라인업 등) ---
    async function loadPlayers() {
        const q = query(collection(db, "users"), where("teamName", "==", userData.teamName), where("approved", "==", true));
        onSnapshot(q, (qs) => {
            const list = document.getElementById('full-player-list');
            list.innerHTML = "";
            qs.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="player-list-item">
                        <div class="player-img"></div>
                        <div><b>${p.email.split('@')[0]}</b><br><small>${p.role}</small></div>
                    </div>`;
            });
        });
    }

    window.saveLineup = async () => {
        const lineup = {};
        document.querySelectorAll('.player-slot').forEach(slot => {
            const pos = slot.id.replace('pos-', '');
            lineup[pos] = prompt(`${pos} 포지션 선수 이름?`);
            slot.innerHTML = `${pos}<br>${lineup[pos] || '-'}`;
        });
        await setDoc(doc(db, "lineups", userData.teamName), lineup);
        alert("라인업이 저장되었습니다!");
    };

    async function loadLineup() {
        onSnapshot(doc(db, "lineups", userData.teamName), (doc) => {
            if(doc.exists()) {
                const data = doc.data();
                Object.keys(data).forEach(pos => {
                    const el = document.getElementById('pos-' + pos);
                    if(el) el.innerHTML = `${pos}<br>${data[pos]}`;
                });
            }
        });
    }

    function createCalendar() {
        const container = document.getElementById('calendar-view');
        container.innerHTML = "";
        for(let i=1; i<=30; i++) {
            const d = document.createElement('div');
            d.style.padding = "10px"; d.style.border = "1px solid #eee";
            d.innerText = i;
            container.appendChild(d);
        }
    }

    window.toggleMenu = () => document.getElementById('sideMenu').classList.toggle('active');
    window.showSec = (id) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        toggleMenu();
    };
    window.handleLogout = () => { signOut(auth); location.reload(); };
</script>
</body>
</html>
