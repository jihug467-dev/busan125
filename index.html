<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Slam Master v1.0</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --p: #072754; --a: #d31145; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 150; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #999; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .post { border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-p { background: var(--p); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
    </style>
</head>
<body>

<!-- 헤더 -->
<header id="appHeader">
    <span class="material-icons" onclick="toggleMenu()">menu</span>
    <div style="display:flex; align-items:center; gap:10px;">
        <img id="teamLogo" class="logo-img" src="">
        <span id="teamNameDisp">로딩 중...</span>
    </div>
    <span class="material-icons" onclick="location.reload()">refresh</span>
</header>

<!-- 사이드 메뉴 -->
<div id="sideMenu" class="side-menu">
    <div style="padding:20px; background:var(--p); color:white;"><b>야구단 메뉴</b></div>
    <div class="menu-item" onclick="showSec('board')"><span class="material-icons">forum</span> 팀 게시판</div>
    <div class="menu-item" onclick="showSec('stats')"><span class="material-icons">analytics</span> 개인 기록실</div>
    <div class="menu-item mgr-ui hidden" onclick="showSec('approval')"><span class="material-icons">how_to_reg</span> 가입 승인 관리</div>
    <div class="menu-item" onclick="showSec('settings')"><span class="material-icons">settings</span> 팀 설정</div>
    <div class="menu-item" style="color:red" onclick="handleLogout()"><span class="material-icons">logout</span> 로그아웃</div>
</div>

<div id="main-content">
    <!-- 1. 게시판 -->
    <section id="sec-board" class="app-sec">
        <div class="card">
            <h3>📝 팀 공지 및 게시판</h3>
            <textarea id="postInput" placeholder="팀원들과 나누고 싶은 이야기를 적어보세요."></textarea>
            <button class="btn-p" onclick="savePost()">글 올리기</button>
            <div id="postList" style="margin-top:20px;"></div>
        </div>
    </section>

    <!-- 2. 가입 승인 (감독 전용) -->
    <section id="sec-approval" class="app-sec hidden">
        <div class="card">
            <h3 style="color:var(--a)">🚩 가입 승인 대기 명단</h3>
            <div id="approvalList"></div>
        </div>
    </section>

    <!-- 3. 개인 기록 (투타) -->
    <section id="sec-stats" class="app-sec hidden">
        <div class="card">
            <h3>📊 내 시즌 기록</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; text-align:center;">
                <div style="background:#f9f9f9; padding:10px; border-radius:8px;">
                    <p><b>타자 기록</b></p>
                    <div id="hitterStats">타율: -.--- / 홈런: 0</div>
                </div>
                <div style="background:#f9f9f9; padding:10px; border-radius:8px;">
                    <p><b>투수 기록</b></p>
                    <div id="pitcherStats">방어율: --.-- / 승리: 0</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. 팀 설정 (로고 등록 등) -->
    <section id="sec-settings" class="app-sec hidden">
        <div class="card">
            <h3>⚙️ 팀 설정</h3>
            <div class="mgr-ui hidden">
                <p>팀 로고 이미지 URL</p>
                <input type="text" id="logoUrlInput" placeholder="이미지 주소를 입력하세요">
                <button class="btn-p" onclick="updateLogo()">로고 변경</button>
            </div>
            <hr>
            <p>프로필 관리</p>
            <button class="btn-p" style="background:#666;" onclick="location.reload()">정보 새로고침</button>
        </div>
    </section>
</div>

<!-- 하단바 -->
<nav class="nav">
    <div class="nav-item" onclick="showSec('board')"><span class="material-icons">forum</span>게시판</div>
    <div class="nav-item" onclick="showSec('stats')"><span class="material-icons">analytics</span>기록</div>
    <div class="nav-item" onclick="toggleMenu()"><span class="material-icons">menu</span>메뉴</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCio2QRCCR5RhnA6l-pnNzMQ8cWKO0Z1Dg",
        authDomain: "busan260501-147bb.firebaseapp.com",
        projectId: "busan260501-147bb",
        storageBucket: "busan260501-147bb.firebasestorage.app",
        messagingSenderId: "322128107410",
        appId: "1:322128107410:web:c6b8fbbda00a09fcae534b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let userData = null;

    // 로그인 감지 및 정보 로드
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            const uSnap = await getDoc(userRef);
            if(uSnap.exists()) {
                userData = uSnap.data();
                document.getElementById('teamNameDisp').innerText = userData.teamName;
                if(userData.role === 'manager') {
                    document.querySelectorAll('.mgr-ui').forEach(e => e.classList.remove('hidden'));
                    loadApprovalList();
                }
                loadPosts();
                loadTeamInfo();
                loadStats();
            }
        } else {
            // 로그인 페이지가 없으면 일단 로딩 중지
            console.log("로그인이 필요합니다.");
        }
    });

    // 가입 승인 관리
    function loadApprovalList() {
        const q = query(collection(db, "users"), where("teamName", "==", userData.teamName), where("approved", "==", false));
        onSnapshot(q, (snaps) => {
            const list = document.getElementById('approvalList');
            list.innerHTML = "";
            snaps.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="post" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${p.email}</span>
                    <button class="btn-p" style="width:auto; padding:5px 10px;" onclick="approveUser('${d.id}')">승인</button>
                </div>`;
            });
        });
    }
    window.approveUser = async (id) => {
        await updateDoc(doc(db, "users", id), { approved: true });
        alert("승인되었습니다!");
    };

    // 팀 로고 및 이름 정보
    window.updateLogo = async () => {
        const url = document.getElementById('logoUrlInput').value;
        await setDoc(doc(db, "teams", userData.teamName), { logo: url }, { merge: true });
        alert("팀 로고가 업데이트되었습니다!");
    };
    function loadTeamInfo() {
        onSnapshot(doc(db, "teams", userData.teamName), (d) => {
            if(d.exists() && d.data().logo) document.getElementById('teamLogo').src = d.data().logo;
        });
    }

    // 게시판 기능
    window.savePost = async () => {
        const text = document.getElementById('postInput').value;
        if(!text) return;
        await addDoc(collection(db, "posts"), {
            team: userData.teamName,
            writer: userData.email.split('@')[0],
            content: text,
            createdAt: Date.now()
        });
        document.getElementById('postInput').value = "";
    };
    function loadPosts() {
        const q = query(collection(db, "posts"), where("team", "==", userData.teamName), orderBy("createdAt", "desc"));
        onSnapshot(q, (snaps) => {
            const list = document.getElementById('postList');
            list.innerHTML = "";
            snaps.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="post"><b>${p.writer}</b>: ${p.content}</div>`;
            });
        });
    }

    // 개인 기록 로드
    async function loadStats() {
        const sSnap = await getDoc(doc(db, "stats", auth.currentUser.uid));
        if(sSnap.exists()) {
            const s = sSnap.data();
            document.getElementById('hitterStats').innerHTML = `타율: ${s.avg || '.000'} / 홈런: ${s.hr || 0}`;
            document.getElementById('pitcherStats').innerHTML = `방어율: ${s.era || '0.00'} / 승리: ${s.w || 0}`;
        }
    }

    // UI 제어
    window.toggleMenu = () => document.getElementById('sideMenu').classList.toggle('active');
    window.showSec = (id) => {
        document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu();
    };
    window.handleLogout = () => { signOut(auth); location.reload(); };
</script>
</body>
</html>
